<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STAR Design Editor</title>

<link rel="stylesheet" href="../styles/reset.css">
<link rel="stylesheet" href="../styles/layout.css">
<link rel="stylesheet" href="../styles/editor.css">
<link rel="stylesheet" href="../styles/components.css">

</head>

<body>

<header class="editor-header">

<div class="logo">⭐ STAR</div>

<div class="header-actions">

<button id="undoBtn">↶</button>

<button id="redoBtn">↷</button>

<button id="saveBtn">💾</button>

<button id="exportBtn">⬇️</button>

</div>

</header>

<div class="editor-workspace">

<aside class="toolbar">

<button id="textTool">📝<span>نص</span></button>

<button id="imageTool">
🖼️
<span>صورة</span>
</button>

<input 
type="file" 
id="imageInput" 
accept="image/*" 
hidden>
<button id="shapeTool">⬜<span>شكل</span></button>

<button id="colorTool">🎨<span>لون</span></button>

<button id="layerTool">📚<span>طبقات</span></button>

</aside>

<main class="canvas-area">

<div id="designCanvas"></div>

</main>

<aside class="properties">

<h3>الخصائص</h3>

<div id="propertiesPanel">
اختر عنصراً للتعديل
</div>

</aside>

</div>

<script type="module" src="../js/editor/editorController-test.js"></script>
</body>
</html>
