<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STAR Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:#0f172a;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}

.container{

    width:90%;
    max-width:380px;

}

.logo{

    text-align:center;
    font-size:40px;
    font-weight:bold;
    margin-bottom:15px;

}

.subtitle{

    text-align:center;
    color:#94a3b8;
    margin-bottom:35px;

}

input{

    width:100%;
    padding:15px;

    border:none;
    border-radius:12px;

    margin-bottom:15px;

    background:#1e293b;
    color:white;

    font-size:15px;

}

button{

    width:100%;
    padding:15px;

    border:none;
    border-radius:12px;

    background:#2563eb;
    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

}

button:hover{

    background:#1d4ed8;

}

.switch{

    margin-top:20px;

    text-align:center;

}

.switch a{

    color:#60a5fa;

    text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">⭐ STAR Chat</div>

<div class="subtitle">
تسجيل الدخول أو إنشاء حساب جديد
</div>

<input
id="email"
type="email"
placeholder="البريد الإلكتروني">

<input
id="password"
type="password"
placeholder="كلمة المرور">

<button id="loginBtn">
تسجيل الدخول
</button>

<button
id="registerBtn"
style="margin-top:12px;background:#10b981;">
إنشاء حساب
</button>

</div>

<script type="module" src="../js/app.js"></script>

</body>

</html>
