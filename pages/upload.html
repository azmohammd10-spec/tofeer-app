<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>رفع فيديو - STAR</title>

<style>

body{
    background:#000;
    color:#fff;
    font-family:Arial;
    margin:0;
    padding:20px;
}

/* زر رجوع */
.floating-btn{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#FFD700;
    color:#000;
    padding:12px 18px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    z-index:999;
}

/* الحاوية */
.container{
    max-width:500px;
    margin:auto;
    margin-top:60px;
}

input,textarea,button,select{
    width:100%;
    margin-top:15px;
    padding:14px;
    border-radius:10px;
    border:none;
    box-sizing:border-box;
    font-size:14px;
}

button{
    background:#FFD700;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

/* عنوان الصفحة */
h2{
    text-align:center;
    color:#FFD700;
}

</style>

</head>

<body>

<!-- زر الرجوع -->
<a href="home.html" class="floating-btn">← رجوع</a>

<div class="container">

<h2>رفع فيديو جديد</h2>

<input type="file" id="videoFile" accept="video/*">

<textarea id="caption" placeholder="اكتب وصف الفيديو"></textarea>

<select id="category">

<option value="عام">عام</option>
<option value="تقنية">تقنية</option>
<option value="رياضة">رياضة</option>
<option value="ألعاب">ألعاب</option>
<option value="طبخ">طبخ</option>

</select>

<button id="uploadBtn">رفع الفيديو</button>

</div>

<script type="module" src="../js/upload.js"></script>

</body>
</html>
