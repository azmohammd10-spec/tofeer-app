<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR - For You</title>

<style>
 .side-actions {
    position: absolute;
    left: 15px;   /* بدل right */
    bottom: 120px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
    z-index: 5;
}

.action {
    color: white;
    text-align: center;
    cursor: pointer;
}

.action .icon {
    font-size: 28px;
}

.action small {
    display: block;
    font-size: 12px;
    margin-top: 3px;
}   

body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial;
}

/* العنوان */
header{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    color:#FFD700;
    font-size:18px;
    z-index:10;
}

/* الفيديوهات */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.video{
    height:100vh;
    width:100%;
    position:relative;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* معلومات الفيديو */
.overlay{
    position:absolute;
    bottom:20px;
    right:15px;
    color:#fff;
    font-size:14px;
    background:rgba(0,0,0,0.4);
    padding:10px;
    border-radius:10px;
}

/* زر رفع الفيديو */
.upload-btn{
    position:fixed;
    bottom:20px;
    left:20px;
    width:60px;
    height:60px;
    background:#FFD700;
    color:#000;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
    text-decoration:none;
    z-index:9999;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<header>⭐ STAR For You</header>

<!-- زر رفع الفيديو -->
<a href="upload.html" class="upload-btn">＋</a>

<!-- مكان الفيديوهات -->
<div id="feed"></div>

<script type="module" src="../js/app.js"></script>

</body>
</html>
