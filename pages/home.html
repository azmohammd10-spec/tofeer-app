<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>STAR Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/home.css">
  <link rel="stylesheet" href="../styles/components.css">
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="header">
    <div class="logo">⭐ STAR</div>

    <input type="text" id="searchInput" placeholder="ابحث عن تصميم..." />

    <div class="profile">
      <img src="../assets/default-avatar.png" />
    </div>
  </header>

  <!-- =========================
       CATEGORIES
  ========================== -->
  <section class="categories" id="categoriesBar">
    <!-- سيتم تعبئتها لاحقًا من JS -->
  </section>

  <!-- =========================
       TEMPLATES GRID
  ========================== -->
  <main class="templates-grid" id="templatesGrid">
    <!-- القوالب ستظهر هنا -->
  </main>

  <!-- =========================
       CREATE BUTTON
  ========================== -->
  <button class="create-btn" id="createBtn">
    ➕ إنشاء تصميم
  </button>

  <!-- =========================
       BOTTOM NAV
  ========================== -->
  <nav class="bottom-nav">
    <div>🏠</div>
    <div>🔍</div>
    <div>➕</div>
    <div>❤️</div>
    <div>⚙️</div>
  </nav>

  <!-- =========================
       JS
  ========================== -->
  <script type="module" src="../js/ui/homeUI.js"></script>

</body>
</html>
