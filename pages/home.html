<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR - For You</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial;
}

#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.video{
    height:100vh;
    width:100%;
    position:relative;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    bottom:20px;
    right:15px;
    color:#fff;
    font-size:14px;
    background:rgba(0,0,0,0.4);
    padding:10px;
    border-radius:10px;
}

header{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    color:#FFD700;
    font-size:18px;
    z-index:10;
}
</style>
</head>

<body>

<header>⭐ STAR For You</header>

<div id="feed"></div>

<script type="module" src="../js/app.js"></script>

</body>
</html>
