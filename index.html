<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق دردشة</title>

<style>
#app{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.page{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    transition:transform 0.3s ease;
}

/* الهيدر */
.top-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#fff;
    position:sticky;
    top:0;
    z-index:100;
}

.add-friend-btn{
    border:none;
    background:#0084ff;
    color:#fff;
    padding:10px 14px;
    border-radius:12px;
    font-size:14px;
    cursor:pointer;
    font-weight:bold;
}

.add-friend-btn:active{
    transform:scale(.96);
}

/* إعادة تعيين */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background-color: #FFFFFF;
    color: #000;
}

/* nav */
.nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:65px;
    background:#fff;
    border-top:1px solid #eee;
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:1000;
}

.nav div{
    text-align:center;
    font-size:18px;
    cursor:pointer;
    color:#333;
}

.nav div:hover{
    color:#00bfff;
}

/* chat */
#chatPage {
    padding: 70px 12px 90px;
}

.chat {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px;
    border-bottom:1px solid #F0F0F0;
}

/* chat detail */
#chatDetail{
    display:none;
    position:fixed;
    inset:0;
    background:#fff;
    flex-direction:column;
    z-index:9999;
} /* ✅ لازم هذا القوس */

/* input */
.input-box{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px;
    background:#fff;
    border-top:1px solid #eee;
}

.input-box input{
    flex:1;
    height:45px;
    border:none;
    outline:none;
    background:#f5f5f5;
    border-radius:25px;
    padding:0 15px;
}

.emoji-box{
    display:none;
    position:absolute;
    bottom:70px;
    left:0;
    right:0;
    background:#fff;
    padding:10px;
    border-top:1px solid #eee;
    z-index:10000;
}
   
/* تأثير خفيف عند تمرير الفأرة على المحادثة */
.chat:hover {
    border-right: 4px solid #00BFFF;
}

/* زر الإرسال / الميكروفون */
#sendBtn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background-color: #25d366;
    color: #000;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

  .emoji-box span{
cursor:pointer;
padding:4px;
display:inline-block;
}
  .emoji-box{
display:none;
padding:10px;
background:#fff;
border-top:1px solid #eee;
font-size:24px;
line-height:2;
}
  
.attach-btn,
.voice-btn,
.send-btn{
width:44px;
height:44px;
border:none;
border-radius:12px;
background:#f2f2f2;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}
   
.left{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:#ddd;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#777;margin-top:3px;}

/* CALL */
.call-btn{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:#f2f2f2;
cursor:pointer;
}

/* ===== STORIES ===== */
#stories{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    z-index:2000;
}

/* زر رجوع */
.story-back{
    position:absolute;
    top:15px;
    left:15px;
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    color:#fff;
    font-size:20px;
    cursor:pointer;
}

/* أزرار القصص */
.story-actions{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:25px;
}

.story-actions div{
    font-size:26px;
    color:#fff;
}
</style>
</head>
<body>
<div id="app">

    <div id="chatPage" class="page">الدردشات</div>

    <div id="stories" class="page" style="display:none;">القصص</div>

    <div id="profilePage" class="page" style="display:none;">الحساب</div>

</div>
<div id="chatPage">

    <div style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
        <h3 style="margin:0;">الدردشات</h3>
        <button class="add-friend-btn" onclick="addFriend()">➕ إضافة صديق</button>
    </div>

</div>

    <!-- قائمة الدردشات -->
    <div class="chat" onclick="openChat('أحمد')">
        <div class="left">
            <div class="avatar"></div>
            <div>
                <div class="name">أحمد</div>
                <div class="msg">مرحباً 👋</div>
            </div>
        </div>
        <button class="call-btn">📞</button>
    </div>

    <div class="chat" onclick="openChat('خالد')">
        <div class="left">
            <div class="avatar"></div>
            <div>
                <div class="name">خالد</div>
                <div class="msg">كيف حالك؟</div>
            </div>
        </div>
        <button class="call-btn">📞</button>
    </div>

</div>
<!-- CHAT -->
<div id="chatDetail">

    <div class="header">
        <button class="back-btn" onclick="closeChat()">←</button>
        <div id="chatName">محادثة</div>
    

</div>


<div id="messages"></div>

<div class="input-box">
    <button class="attach-btn">🖼️</button>

    <button class="attach-btn" onclick="toggleEmoji()">😀</button>

    <input
        id="msgInput"
        type="text"
        placeholder="اكتب رسالة..."
        oninput="toggleButton()"
    >

    <button id="sendBtn" onclick="send()">🎙️</button>
</div>

<div id="emojiBox" class="emoji-box">
    <span>😀</span>
    <span>😂</span>
    <span>😍</span>
    <span>😎</span>
    <span>😢</span>
    <span>😡</span>
    <span>👍</span>
    <span>❤️</span>
    <span>🔥</span>
</div>

</div>
<!-- STORIES -->
<div id="stories">
    <button class="story-back" onclick="closeStories()">←</button>

    <div class="story-actions">
        <div onclick="console.log('تم الإعجاب بالقصة')">❤</div>
        <div onclick="console.log('فتح قائمة المشاهدات')">👁</div>
    </div>
</div>

<div id="plusMenu" class="plus-menu" style="display:none;">
    <div onclick="document.getElementById('fileInput').click()">🖼️ استوديو</div>
</div>
<script>    
    
function openProfile(){
    alert("الملف الشخصي");
}

function addFriend(){
    let name = prompt("أدخل اسم الصديق");
    
    if(name && name.trim() !== ""){
        alert("تم إرسال طلب صداقة إلى: " + name);
    }
}

// الصفحات
let current = 0;
const pages = ["chatPage", "stories", "profilePage"];

function showPage(index){
    pages.forEach((id, i)=>{
        document.getElementById(id).style.display = (i === index) ? "block" : "none";
    });
    current = index;
}

// أزرار التنقل
function showChats(){ showPage(0); }
function showStories(){ showPage(1); }
function showProfile(){ showPage(2); }

// السحب
let startX = 0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if(Math.abs(diff) > 50){
        if(diff > 0){
            if(current < pages.length - 1) current++;
        }else{
            if(current > 0) current--;
        }
        showPage(current);
    }
});

function closeStories(){
    document.getElementById("stories").style.display = "none";
}

</script> 
 <input type="file" id="fileInput"
style="display:none"
accept="image/*,video/*"
onchange="handleFile(event)">
        
</body>
</html>
