<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
.tiktok-btn{
position:relative;
top:-18px;

width:54px;
height:40px;

display:flex;
align-items:center;
justify-content:center;

background:#ffffff;
border-radius:12px;

font-size:28px;
font-weight:700;
color:#000;

cursor:pointer;
user-select:none;

z-index:2;
}

.tiktok-btn::before{
content:"";
position:absolute;

left:-5px;
top:0;

width:54px;
height:40px;

background:#25F4EE;
border-radius:12px;

z-index:-1;
}

.tiktok-btn::after{
content:"";
position:absolute;

right:-5px;
top:0;

width:54px;
height:40px;

background:#FE2C55;
border-radius:12px;

z-index:-2;
}

.tiktok-btn:
/* ===== BASE ===== */
body{
margin:0;
font-family:system-ui;
background:#f7fbff;
}

/* ===== CHAT LIST ===== */
.chat{
display:flex;
align-items:center;
gap:10px;
padding:15px;
background:#fff;
border-bottom:1px solid #eef3f8;
cursor:pointer;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:linear-gradient(135deg,#7dd3fc,#fbcfe8);
}

.name{
font-weight:700;
}

.msg{
font-size:12px;
color:#888;
}

/* ===== CHAT PAGE ===== */
#chatDetail{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
flex-direction:column;
z-index:1000;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:15px;
border-bottom:1px solid #eef3f8;
}

#messages{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:linear-gradient(135deg,#7dd3fc,#fbcfe8);
color:#fff;
padding:10px 15px;
border-radius:20px;
max-width:70%;
}

.other-msg{
align-self:flex-start;
background:#f1f5f9;
padding:10px 15px;
border-radius:20px;
max-width:70%;
}

/* INPUT */
.input-box{
display:flex;
gap:10px;
padding:10px;
background:#f8fafc;
border-top:1px solid #e5eaf0;
}

.input-box input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #dbe5f0;
outline:none;
}

.input-box button{
padding:10px 15px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#7dd3fc,#fbcfe8);
color:#fff;
cursor:pointer;
}

/* ===== STORIES ===== */
#stories{
display:none;
height:100vh;
background:linear-gradient(135deg,#7dd3fc,#fbcfe8);
color:#fff;
text-align:center;
padding-top:60%;
}

/* ===== NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #eef3f8;
}

/* ===== SOFT + BUTTON ===== */
.plus-btn{
width:48px;
height:48px;
border-radius:50%;
background:linear-gradient(135deg,#7dd3fc,#fbcfe8);
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:30px;
font-weight:bold;
position:relative;
top:-16px;
cursor:pointer;

box-shadow:0 6px 15px rgba(125,211,252,0.3);
transition:0.2s;
}

.plus-btn:active{
transform:scale(0.92);
}

.nav div{
cursor:pointer;
font-size:18px;
}

</style>
</head>

<body>

<!-- CHAT LIST -->
<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>

</div>

<!-- CHAT DETAIL -->
<div id="chatDetail">

<div class="header">
<button onclick="closeChat()">⬅️</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages">
<div class="other-msg">أهلاً 👋</div>
<div class="my-msg">مرحبا!</div>
</div>

<div class="input-box">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="sendMessage()">إرسال</button>
</div>

</div>

<!-- STORIES -->
<div id="stories">
<h2>👁 القصص</h2>
<p>هنا القصص</p>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="showChats()">💬</div>

<div class="tiktok-btn">+</div>

<div onclick="showStories()">👁</div>
</div>

<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("stories").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showStories(){
document.getElementById("chatPage").style.display="none";
document.getElementById("stories").style.display="block";
document.getElementById("chatDetail").style.display="none";
}

function sendMessage(){
let input=document.getElementById("msgInput");

if(input.value.trim()!==""){
let msg=document.createElement("div");
msg.className="my-msg";
msg.innerText=input.value;

document.getElementById("messages").appendChild(msg);

input.value="";
}
}

</script>

</body>
</html>
