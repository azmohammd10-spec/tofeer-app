<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير - دردشة</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ضع_مفتاحك",
  authDomain: "tofeer-e9c5a.firebaseapp.com",
  projectId: "tofeer-e9c5a",
  appId: "1:927174968674:web:5bafb6e43161c5cda983b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* reCAPTCHA */
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha", {
  size: "invisible"
});

/* إرسال كود */
window.sendCode = async function(){

  const phone = document.getElementById("phone").value;

  window.confirmationResult = await signInWithPhoneNumber(
    auth,
    phone,
    window.recaptchaVerifier
  );

  alert("تم إرسال الكود");
};

/* تأكيد الكود */
window.verifyCode = async function(){

  const code = document.getElementById("code").value;

  await window.confirmationResult.confirm(code);

  alert("تم تسجيل الدخول");
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
};
</script>
background:#eef2f7;
}

/* APP */
.app{
display:block;
}

/* HEADER */
.header{
height:60px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
border-bottom:1px solid #e5e7eb;
}

/* CHAT LIST */
.content{
padding:12px;
height:calc(100vh - 120px);
overflow-y:auto;
}

.chat-item{
display:flex;
align-items:center;
gap:12px;
background:#fff;
padding:12px;
margin-bottom:10px;
border-radius:14px;
cursor:pointer;
}

.chat-item:hover{
background:#f9fafb;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#94a3b8,#cbd5e1);
}

.name{
font-weight:600;
font-size:15px;
}

.msg-preview{
font-size:13px;
color:#6b7280;
margin-top:3px;
}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #e5e7eb;
}

.nav-item{
font-size:12px;
color:#6b7280;
display:flex;
flex-direction:column;
align-items:center;
}

.nav-item.active{
color:#111827;
font-weight:600;
}

/* CHAT SCREEN */
#chat-screen{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#f3f4f6;
}

.chat-header{
height:60px;
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid #e5e7eb;
font-weight:600;
}

.back{
color:#2563eb;
cursor:pointer;
}

#chat-box{
padding:12px;
height:calc(100vh - 140px);
overflow-y:auto;
}

.msg{
background:#fff;
padding:10px 12px;
margin:8px 0;
border-radius:12px;
max-width:70%;
width:fit-content;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* INPUT */
.input-box{
display:flex;
gap:8px;
padding:10px;
background:#fff;
position:fixed;
bottom:0;
left:0;
right:0;
border-top:1px solid #e5e7eb;
}

.input-box input{
flex:1;
padding:10px;
border:1px solid #e5e7eb;
border-radius:10px;
outline:none;
}

.input-box button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#111827;
color:#fff;
cursor:pointer;
}
</style>

</head>

<body>

<!-- APP -->
<div class="app">

<div class="header">توفير</div>

<div class="content">

<div class="chat-item" onclick="openChat('أحمد')">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg-preview">مرحبا 👋</div>
</div>
</div>

<div class="chat-item" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg-preview">شكراً لك</div>
</div>
</div>

</div>

<div class="bottom-nav">
<div class="nav-item active">💬 دردشات</div>
<div class="nav-item">📸 قصص</div>
</div>

</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">

<div class="chat-header">
<span id="chat-name">المحادثة</span>
<span class="back" onclick="closeChat()">رجوع</span>
</div>

<div id="chat-box"></div>

<div class="input-box">
<input id="msg" placeholder="اكتب رسالة...">
<button onclick="sendMsg()">إرسال</button>
</div>

</div>

<script>

function openChat(name){
document.querySelector(".app").style.display="none";
document.getElementById("chat-screen").style.display="block";
document.getElementById("chat-name").innerText=name;
}

function closeChat(){
document.querySelector(".app").style.display="block";
document.getElementById("chat-screen").style.display="none";
}

function sendMsg(){
let msg = document.getElementById("msg").value;
if(msg.trim()==="") return;

let box = document.getElementById("chat-box");

box.innerHTML += `
<div class="msg">${msg}</div>
`;

document.getElementById("msg").value="";
}

</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ضع_مفتاحك",
  authDomain: "tofeer-e9c5a.firebaseapp.com",
  projectId: "tofeer-e9c5a",
  storageBucket: "tofeer-e9c5a.appspot.com",
  messagingSenderId: "927174968674",
  appId: "1:927174968674:web:5bafb6e43161c5cda983b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentChat = "global";

/* فتح الشات */
window.openChat = function(name){
document.querySelector(".app").style.display="none";
document.getElementById("chat-screen").style.display="block";
document.getElementById("chat-name").innerText=name;
currentChat = name;
loadMessages();
}

/* إغلاق الشات */
window.closeChat = function(){
document.querySelector(".app").style.display="block";
document.getElementById("chat-screen").style.display="none";
}

/* إرسال رسالة */
window.sendMsg = async function(){
let msg = document.getElementById("msg").value;
if(msg.trim()==="") return;

await addDoc(collection(db,"chats"),{
text: msg,
chat: currentChat,
time: Date.now()
});

document.getElementById("msg").value="";
}

/* تحميل الرسائل */
function loadMessages(){
const q = query(collection(db,"chats"), orderBy("time"));

onSnapshot(q,(snapshot)=>{
let box = document.getElementById("chat-box");
box.innerHTML="";

snapshot.forEach(doc=>{
let m = doc.data();

if(m.chat === currentChat){
box.innerHTML += `
<div class="msg">${m.text}</div>
`;
}
});

});
}
</script>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "ضع_مفتاحك",
  authDomain: "tofeer-e9c5a.firebaseapp.com",
  projectId: "tofeer-e9c5a",
  storageBucket: "tofeer-e9c5a.appspot.com",
  messagingSenderId: "927174968674",
  appId: "1:927174968674:web:5bafb6e43161c5cda983b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 📌 اسم الشات الحالي */
let currentChat = "global";

/* ===== فتح الشات ===== */
window.openChat = function(name){
  document.querySelector(".app").style.display = "none";
  document.getElementById("chat-screen").style.display = "block";
  document.getElementById("chat-name").innerText = name;

  currentChat = name;
  loadMessages();
};

/* ===== إغلاق الشات ===== */
window.closeChat = function(){
  document.querySelector(".app").style.display = "block";
  document.getElementById("chat-screen").style.display = "none";
};

/* ===== إرسال رسالة ===== */
window.sendMsg = async function(){
  let msg = document.getElementById("msg").value;

  if(msg.trim() === "") return;

  await addDoc(collection(db, "messages"), {
    text: msg,
    chat: currentChat,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
};

/* ===== تحميل الرسائل بشكل حي ===== */
function loadMessages(){

  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, (snapshot) => {

    let box = document.getElementById("chat-box");
    box.innerHTML = "";

    snapshot.forEach(doc => {
      let m = doc.data();

      if(m.chat === currentChat){
        box.innerHTML += `
          <div class="msg">${m.text}</div>
        `;
      }
    });

    box.scrollTop = box.scrollHeight;
  });
}
</script>
</body>
</html>
