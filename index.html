<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق دردشة</title>

<style>
  /* تنسيق زر الميكروفون/الإرسال */
#sendBtn {
    width: 50px;
    height: 50px;
    border-radius: 50%; /* دائري تماماً */
    border: none;
    background-color: #25d366; /* لون أخضر واتساب */
    color: #000;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

  .emoji-box span{
cursor:pointer;
padding:4px;
display:inline-block;
}
  .emoji-box{
display:none;
padding:10px;
background:#fff;
border-top:1px solid #eee;
font-size:24px;
line-height:2;
}
  .input-box{
display:flex;
align-items:center;
gap:8px;
padding:10px;
border-top:1px solid #eee;
background:#fff;
}

.input-box input{
flex:1;
padding:12px;
border:none;
outline:none;
background:#f5f5f5;
border-radius:14px;
}

.attach-btn,
.voice-btn,
.send-btn{
width:44px;
height:44px;
border:none;
border-radius:12px;
background:#f2f2f2;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#fff;
color:#111;
}

/* ===== CHAT LIST ===== */
#chatPage{
padding:70px 12px 90px;
}

.chat{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px;
border-bottom:1px solid #eee;
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:#ddd;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#777;margin-top:3px;}

/* CALL */
.call-btn{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:#f2f2f2;
cursor:pointer;
}

/* ===== CHAT ===== */
#chatDetail{
display:none;
position:fixed;
inset:0;
background:#fff;
flex-direction:column;
z-index:999;
}

.header{
height:55px;
display:flex;
align-items:center;
gap:10px;
padding:0 12px;
border-bottom:1px solid #eee;
}

.back-btn{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:#f2f2f2;
cursor:pointer;
}

/* messages */
#messages{
flex:1;
padding:12px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:#f2f2f2;
padding:10px 14px;
border-radius:14px;
max-width:75%;
}

.other-msg{
align-self:flex-start;
background:#fff;
border:1px solid #eee;
padding:10px 14px;
border-radius:14px;
max-width:75%;
}

/* input */
.input-box{
display:flex;
gap:8px;
padding:10px;
border-top:1px solid #eee;
}

.input-box input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#f7f7f7;
border-radius:10px;
}

.input-box button{
padding:10px 14px;
border:none;
background:#eee;
border-radius:10px;
}

/* ===== STORIES ===== */
#stories{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:2000;
}

/* زر رجوع */
.story-back{
position:absolute;
top:15px;
left:15px;
width:40px;
height:40px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.15);
color:#fff;
font-size:20px;
cursor:pointer;
}

/* أزرار القصص */
.story-actions{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:25px;
}

.story-actions div{
font-size:26px;
color:#fff;
}

/* ===== NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #eee;
}

.nav div{
font-size:22px;
cursor:pointer;
}

/* PLUS */
.plus-btn{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:65px;
height:50px;
border-radius:16px;
background:#f2f2f2;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:900;
cursor:pointer;
}
</style>
</head>

<body>

<!-- CHAT LIST -->
<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="left">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>
<button class="call-btn">📞</button>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="left">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>
<button class="call-btn">📞</button>
</div>

</div>

<!-- CHAT -->
<div id="chatDetail">

<div class="header">
<button class="back-btn" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages"></div>

<div class="input-box">
    <button class="attach-btn">🖼️</button>
    <button class="emoji-btn" onclick="toggleEmoji()">😀</button>
    
    <input id="msgInput" oninput="toggleButton()" placeholder="اكتب رسالة...">

    <button id="sendBtn" class="voice-btn" onclick="send()">🎙️</button>
</div>

  <div id="emojiBox" class="emoji-box">
<span>😀</span>
<span>😂</span>
<span>😍</span>
<span>😎</span>
<span>😢</span>
<span>😡</span>
<span>👍</span>
<span>❤️</span>
<span>💔</span>
<span>🔥</span>
<span>🎉</span>
<span>😁</span>
<span>🤔</span>
<span>😴</span>
<span>😘</span>
<span>😭</span>
</div>
</div>
<!-- STORIES -->
<div id="stories">

<button class="story-back" onclick="closeStories()">←</button>

<div class="story-actions">
<div>❤</div>
<div>👁</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="showChats()">💬</div>
<div onclick="showStories()">👁</div>
</div>

<!-- PLUS -->
<div class="plus-btn">+</div>

<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("stories").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showStories(){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="block";
}

function closeStories(){
document.getElementById("stories").style.display="none";
document.getElementById("chatPage").style.display="block";
}
  
// 1. الدالة المسؤولة عن تبديل شكل الزر
function toggleButton() {
    var input = document.getElementById('msgInput');
    var btn = document.getElementById('sendBtn');
    
    if (input.value.trim().length > 0) {
        btn.innerHTML = "➤"; 
        btn.style.backgroundColor = "#0084ff"; 
        btn.style.color = "white";
    } else {
        btn.innerHTML = "🎙️"; 
        btn.style.backgroundColor = "#f2f2f2"; // لون الخلفية الأصلي للأزرار
        btn.style.color = "#000";
    }
}

// 2. تحديث دالة send لتستدعي toggleButton بعد الإرسال
function send(){
    let input = document.getElementById("msgInput");
    if(input.value.trim() !== ""){
        let msg = document.createElement("div");
        msg.className = "my-msg";
        msg.innerText = input.value;
        document.getElementById("messages").appendChild(msg);
        input.value = "";
        toggleButton(); // إعادة الزر للميكروفون بعد الإرسال
    }
}


</script>

</body>
</html>
