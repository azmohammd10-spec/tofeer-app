<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Star Social</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding:30px;
    }

    .box{
      background:#fff;
      padding:20px;
      border-radius:12px;
      width:300px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:90%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:95%;
      padding:10px;
      background:#4CAF50;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#45a049;
    }

    #home{
      display:none;
    }
   #messages{
  scroll-behavior:smooth;
} 
  
  </style>
</head>
<body>
<body>

<!-- HEADER -->
<div style="
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  background:#4CAF50;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  z-index:9999;
">
  <b>Star Social</b>
  <span id="userInfoTop"></span>
</div>

<!-- CONTENT -->
<div style="padding-top:65px; padding-bottom:70px;">

  <!-- HOME / USERS -->
  <div id="homeScreen">

    <h3>👥 المستخدمون</h3>
    <div id="usersList"></div>

  </div>

  <!-- CHAT -->
  <div id="chatBox" style="display:none;">

    <h3>💬 الدردشة</h3>

    <div id="messages" style="
      height:300px;
      overflow-y:auto;
      background:#f1f1f1;
      padding:10px;
      border-radius:10px;
    "></div>

    <div id="typing" style="font-size:12px;color:gray;height:20px;"></div>

    <div style="display:flex; gap:6px; margin-top:10px;">
      <input type="text" id="msg" placeholder="اكتب رسالة..."
        style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;">
      
      <button onclick="sendMessage()"
        style="width:50px;border:none;border-radius:50%;background:#4CAF50;color:white;">
        ➤
      </button>
    </div>

    <button onclick="closeChat()" style="margin-top:10px;width:100%;">
      رجوع
    </button>

  </div>

</div>

<!-- LOGIN -->
<div class="box" id="login">
  <h2>تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>
</div>

<!-- NAVIGATION -->
<div style="
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:55px;
  background:#fff;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:space-around;
  align-items:center;
">

  <button onclick="showHome()">💬</button>
  <button onclick="alert('قريباً')">👥</button>
  <button onclick="alert('قريباً')">⚙️</button>

</div>

</body>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// ================== GLOBALS ==================
let currentChatId = null;
let currentChatUser = null;
let unsubscribeMessages = null;

// ================== FIREBASE ==================
const firebaseConfig = {
  apiKey: "AIzaSyCEuOcQIvg-chEXfwHM8JAxFeYGpaOIoP4",
  authDomain: "star-social-bdfb2.firebaseapp.com",
  projectId: "star-social-bdfb2",
  storageBucket: "star-social-bdfb2.firebasestorage.app",
  messagingSenderId: "256449419301",
  appId: "1:256449419301:web:970b4905d6beb86c4087cc",
  measurementId: "G-JYT3F33K7Y"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);

setPersistence(auth, browserLocalPersistence);

// ================== LOGIN ==================
window.login = function () {
  const email = emailEl().value.trim();
  const password = passEl().value.trim();

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("تم تسجيل الدخول"))
    .catch(err => alert(err.message));
};

window.register = function () {
  const email = emailEl().value.trim();
  const password = passEl().value.trim();

  createUserWithEmailAndPassword(auth, email, password)
    .then(async (user) => {
      await setDoc(doc(db, "users", user.user.uid), {
        email: user.user.email,
        name: email.split("@")[0]
      });

      alert("تم إنشاء الحساب");
    })
    .catch(err => alert(err.message));
};

window.logout = async function () {

  if (!auth.currentUser) return;

  if (unsubscribeMessages) unsubscribeMessages();

  await setDoc(doc(db, "users", auth.currentUser.uid), {
    online: false,
    lastSeen: serverTimestamp()
  }, { merge: true });

  await signOut(auth);
};

window.openPrivateChat = function (userId, userName) {

  if (!auth.currentUser) return alert("سجل دخول");

  // إنشاء ID للمحادثة بين المستخدمين
  currentChatId =
    auth.currentUser.uid < userId
      ? auth.currentUser.uid + "_" + userId
      : userId + "_" + auth.currentUser.uid;

  // إظهار الشات وإخفاء الصفحة الرئيسية
  document.getElementById("chatBox").style.display = "block";
  document.getElementById("homeScreen").style.display = "none";

  // تنظيف الرسائل القديمة
  document.getElementById("messages").innerHTML = "";
  document.getElementById("typing").textContent = "";

  // بدء الاستماع للرسائل
  listenMessages();
};
// ================== AUTH STATE ==================
onAuthStateChanged(auth, (user) => {

  const loginBox = document.getElementById("login");
  const homeBox = document.getElementById("homeScreen"); // ✔ مهم

  if (user) {

    loginBox.style.display = "none";
    homeBox.style.display = "block";

    document.getElementById("userInfoTop").textContent = user.email;

    setDoc(doc(db, "users", user.uid), {
      email: user.email,
      name: user.email.split("@")[0],
      online: true,
      lastSeen: serverTimestamp()
    }, { merge: true });

    loadUsers();

  } else {

    loginBox.style.display = "block";
    homeBox.style.display = "none";
  }
});
// ================== USERS ==================
function loadUsers() {

  const usersList = document.getElementById("usersList");

  if (!auth.currentUser) return;

  onSnapshot(collection(db, "users"), (snap) => {

    usersList.innerHTML = "";

    snap.forEach(docSnap => {

      const data = docSnap.data();

      // لا تعرض نفسك
      if (docSnap.id === auth.currentUser.uid) return;

      const name = data.name || "User";
      const status = data.online ? "🟢 متصل" : "⚪ غير متصل";

      const div = document.createElement("div");
      div.style.cssText = `
        background:#fff;
        margin:10px;
        padding:12px;
        border-radius:12px;
        display:flex;
        justify-content:space-between;
        align-items:center;
      `;

      div.innerHTML = `
        <div>
          <b>${name}</b><br>
          <small>${status}</small>
        </div>

        <button style="
          background:#4CAF50;
          color:white;
          border:none;
          padding:8px 12px;
          border-radius:8px;
          cursor:pointer;
        " onclick="openPrivateChat('${docSnap.id}','${name}')">
          مراسلة
        </button>
      `;

      usersList.appendChild(div);
    });
  });
}
// ================== SEND MESSAGE ==================
window.sendMessage = async function () {

  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;
  if (!currentChatId) return alert("اختر مستخدم");

  try {

    await addDoc(
      collection(db, "chats", currentChatId, "messages"),
      {
        text,
        user: auth.currentUser.uid,
        name: auth.currentUser.email.split("@")[0],
        time: serverTimestamp()
      }
    );

    await setDoc(
      doc(db, "chats", currentChatId),
      {
        lastMessage: text,
        lastMessageTime: serverTimestamp()
      },
      
      { merge: true }
    );

    input.value = "";
    input.focus();

  } catch (e) {
    alert(e.message);
  }
};
// ================== LISTEN MESSAGES ==================
function listenMessages(chatId) {

  if (unsubscribeMessages) {
    unsubscribeMessages();
    unsubscribeMessages = null;
  }

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time", "asc")
  );

  unsubscribeMessages = onSnapshot(q, (snap) => {

    const box = document.getElementById("messages");
    box.innerHTML = "";

    snap.forEach(d => {
      const m = d.data();
      const me = m.user === auth.currentUser.uid;

      const div = document.createElement("div");
      div.style.display = "flex";
      div.style.justifyContent = me ? "flex-end" : "flex-start";
      div.style.margin = "5px";

      const bubble = document.createElement("div");
      bubble.style.maxWidth = "70%";
      bubble.style.padding = "10px";
      bubble.style.borderRadius = "12px";
      bubble.style.fontSize = "14px";
      bubble.style.wordBreak = "break-word";
      bubble.style.background = me ? "#4CAF50" : "#eee";
      bubble.style.color = me ? "#fff" : "#000";

      bubble.textContent = m.text || "";

      div.appendChild(bubble);
      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });

  // typing indicator
  const typingRef = doc(db, "chats", chatId);

  onSnapshot(typingRef, (snap) => {
    const data = snap.data();
    const typingDiv = document.getElementById("typing");

    if (!typingDiv) return;

    if (data?.typing && data?.typingUser !== auth.currentUser.uid) {
      typingDiv.textContent = `✍️ ${data.typingUser.split("@")[0]} يكتب الآن...`;
    } else {
      typingDiv.textContent = "";
    }
  });
}
// ================== HELPERS ==================
function emailEl(){ return document.getElementById("email"); }
function passEl(){ return document.getElementById("password"); }
document.getElementById("msg").addEventListener("input", async (e) => {

  if (!currentChatId) return;

  await setDoc(doc(db, "chats", currentChatId), {
    typing: e.target.value.length > 0,
    typingUser: auth.currentUser.email
  }, { merge: true });

});
window.showHome = function () {
  document.getElementById("homeScreen").style.display = "block";
  document.getElementById("chatBox").style.display = "none";
};

window.closeChat = function () {
  document.getElementById("chatBox").style.display = "none";
  document.getElementById("homeScreen").style.display = "block";
};
</script>
</body>
</html>
