<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eefcff;
color:#000;
}

/* ===== CHAT PAGE ===== */
#chatPage{
padding:10px;
padding-bottom:90px;
}

.chat{
display:flex;
align-items:center;
gap:12px;
background:#fff;
padding:14px;
margin-bottom:10px;
border-radius:18px;
cursor:pointer;
box-shadow:0 2px 12px rgba(0,0,0,0.05);
transition:.2s;
}

.chat:active{
transform:scale(.98);
}

.avatar{
width:52px;
height:52px;
border-radius:50%;
background:#74e7ff;
flex-shrink:0;
}

.name{
font-size:15px;
font-weight:700;
color:#000;
margin-bottom:4px;
}

.msg{
font-size:13px;
color:#666;
}

/* ===== CHAT DETAIL ===== */
#chatDetail{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#eefcff;
flex-direction:column;
z-index:1000;
}

.header{
height:65px;
background:#fff;
display:flex;
align-items:center;
gap:10px;
padding:0 15px;
border-bottom:1px solid #d8f8ff;
}

.back-btn{
width:40px;
height:40px;
border:none;
border-radius:12px;
background:#74e7ff;
cursor:pointer;
font-size:18px;
}

#chatName{
font-weight:700;
font-size:16px;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:#74e7ff;
color:#000;
padding:12px 16px;
border-radius:18px 18px 4px 18px;
max-width:75%;
word-wrap:break-word;
}

.other-msg{
align-self:flex-start;
background:#fff;
color:#000;
padding:12px 16px;
border-radius:18px 18px 18px 4px;
max-width:75%;
word-wrap:break-word;
}

/* ===== INPUT ===== */
.input-box{
display:flex;
gap:10px;
padding:12px;
background:#fff;
border-top:1px solid #d8f8ff;
}

.input-box input{
flex:1;
border:none;
outline:none;
background:#eefcff;
padding:12px;
border-radius:16px;
font-size:14px;
color:#000;
}

.input-box button{
border:none;
background:#74e7ff;
color:#000;
padding:12px 18px;
border-radius:16px;
font-weight:700;
cursor:pointer;
}

/* ===== STORIES ===== */
#stories{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#8eefff;
z-index:999;
}

.story-screen{
width:100%;
height:100%;
position:relative;
background:linear-gradient(
180deg,
#a9f4ff,
#74e7ff
);
}

.story-right{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);

display:flex;
flex-direction:column;
gap:25px;
}

.story-icon{
width:50px;
height:50px;
background:rgba(255,255,255,.9);
border-radius:15px;

display:flex;
align-items:center;
justify-content:center;

font-size:24px;

box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.story-bottom{
position:absolute;
bottom:90px;
left:15px;

display:flex;
align-items:center;
gap:10px;
}

.story-avatar{
width:55px;
height:55px;
border-radius:50%;
background:#fff;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;
}

.story-name{
font-size:15px;
font-weight:700;
color:#000;
}
.story-name{
font-size:15px;
font-weight:700;
color:#000;
}

/* ===== BOTTOM NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:72px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #d8f8ff;
box-shadow:0 -2px 15px rgba(0,0,0,0.05);
}

.nav-icon{
font-size:24px;
cursor:pointer;
}

/* ===== TIKTOK STYLE BUTTON ===== */
.tiktok-btn{
width:50px;
height:40px;
background:#74e7ff;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
color:#000;
position:relative;
top:-12px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.12);
transition:.2s;
}

.tiktok-btn:active{
transform:scale(.9);
}

</style>
</head>

<body>

<!-- CHAT PAGE -->
<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>

<div class="chat" onclick="openChat('محمد')">
<div class="avatar"></div>
<div>
<div class="name">محمد</div>
<div class="msg">أهلاً بك</div>
</div>
</div>

</div>

<!-- CHAT DETAIL -->
<div id="chatDetail">

<div class="header">
<button class="back-btn" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages">
<div class="other-msg">أهلاً 👋</div>
<div class="my-msg">مرحباً</div>
</div>

<div class="input-box">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="sendMessage()">إرسال</button>
</div<!-- STORIES -->
<div id="stories">

<div class="story-screen">

<div class="story-right">
<div class="story-icon">❤️</div>
<div class="story-icon">👁</div>
</div>

<div class="story-bottom">
<div class="story-avatar">🤵🏽</div>
<div class="story-name">اسم المستخدم</div>
</div>

</div>

</div>

<!-- NAVIGATION -->
<div class="nav">

<div class="nav-icon" onclick="showChats()">
💬
</div>

<div class="tiktok-btn">
+
</div>

<div class="nav-icon" onclick="showStories()">
👁
</div>

</div>

<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("stories").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("chatPage").style.display="block";
document.getElementById("stories").style.display="none";
document.getElementById("chatDetail").style.display="none";
}

function showStories(){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="block";
}

function sendMessage(){

let input=document.getElementById("msgInput");

if(input.value.trim()!==""){

let msg=document.createElement("div");

msg.className="my-msg";
msg.innerText=input.value;

document.getElementById("messages").appendChild(msg);

input.value="";

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight;

}

}

</script>

</body>
</html>
