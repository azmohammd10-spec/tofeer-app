<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Star Social</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding:30px;
    }

    .box{
      background:#fff;
      padding:20px;
      border-radius:12px;
      width:300px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:90%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:95%;
      padding:10px;
      background:#4CAF50;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#45a049;
    }

    #home{
      display:none;
    }
   #messages{
  scroll-behavior:smooth;
} 
  
  </style>
</head>
<body>
  <div id="home" style="display:none;">
  <h2>أهلاً بك: <span id="userInfo"></span></h2>
  <button onclick="logout()">تسجيل الخروج</button>
  
</div>
<h3>المستخدمون</h3>
<div id="usersList"></div>
<div id="chatBox" style="display:none; width:300px; margin:auto;">
  <h3>💬 الدردشة</h3>

  <div id="messages" style="
    height:300px;
    overflow-y:auto;
    background:#eee;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
  "></div>

  <div style="display:flex; gap:6px;">
    <input type="text" id="msg" placeholder="اكتب رسالة..."
      style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;">

    <button onclick="sendMessage()"
      style="width:50px; border-radius:50%; border:none; background:#4CAF50; color:#fff;">
      ➤
    </button>
  </div>
</div>



<!-- تسجيل الدخول -->
<div class="box" id="login">
  <h2>تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>
</div>

<script 
  type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
// المتغيرات العامة
let currentChatId = null;
let currentChatUser = null;

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCEuOcQIvg-chEXfwHM8JAxFeYGpaOIoP4",
  authDomain: "star-social-bdfb2.firebaseapp.com",
  projectId: "star-social-bdfb2",
  storageBucket: "star-social-bdfb2.firebasestorage.app",
  messagingSenderId: "256449419301",
  appId: "1:256449419301:web:970b4905d6beb86c4087cc",
  measurementId: "G-JYT3F33K7Y"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);
setPersistence(auth, browserLocalPersistence);  
window.openChat = function () {

  const chatBox = document.getElementById("chatBox");

  if (!auth.currentUser) {
    alert("يجب تسجيل الدخول أولاً");
    return;
  }


  chatBox.style.display = "block";

  setTimeout(() => {
    document.getElementById("msg").focus();
  }, 200);
};
// ================== AUTH ==================

window.login = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("الرجاء إدخال البريد وكلمة المرور");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      console.log("Logged in:", userCredential.user.email);
      alert("تم تسجيل الدخول ✔");
    })
    .catch((err) => {
      console.error(err);
      alert("خطأ في تسجيل الدخول: " + err.message);
    });
};


window.logout = function () {
  // ✅ أضف هذا الجزء الجديد هنا (إلغاء الاستماع للرسائل)
  if (unsubscribeMessages) {
    unsubscribeMessages();
    unsubscribeMessages = null;
  }

  // ✅ باقي الكود القديم كما هو
  signOut(auth)
    .then(() => {
      alert("تم تسجيل الخروج");
    })
    .catch((err) => {
      console.error(err);
    });
};


window.register = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("الرجاء إدخال البريد وكلمة المرور");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(async (userCredential) => {
      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        email: user.email,
        name: email.split("@")[0]
      });

      alert("تم إنشاء الحساب 🎉");
    })
    .catch((err) => {
      console.error(err);
      alert("خطأ في إنشاء الحساب: " + err.message);
    });
};
// ================== USER STATE ==================
onAuthStateChanged(auth, (user) => {
  const loginBox = document.getElementById("login");
  const homeBox = document.getElementById("home");
  const userInfo = document.getElementById("userInfo");

  if (user) {
    loginBox.style.display = "none";
    homeBox.style.display = "block";

    if (userInfo) {
      userInfo.innerText = user.email;
    }

    // تحميل قائمة المستخدمين مرة واحدة فقط
    if (!window.usersLoaded) {
      window.usersLoaded = true;
      loadUsers().catch((error) => {
        console.error("Load Users Error:", error);
      });
    }
  } else {
    loginBox.style.display = "block";
    homeBox.style.display = "none";

    if (userInfo) {
      userInfo.innerText = "";
    }

    // إعادة تعيين العلم ليتم التحميل عند الدخول مجدداً
    window.usersLoaded = false;
    
    // إخفاء صندوق الدردشة
    document.getElementById("chatBox").style.display = "none";
    
    // إلغاء الاستماع للرسائل إن وجد (اختياري لكن مستحسن)
    if (unsubscribeMessages) {
      unsubscribeMessages();
      unsubscribeMessages = null;
    }
  }
});
  
async function loadUsers() {
  const usersDiv = document.getElementById("usersList");

  const snapshot = await getDocs(collection(db, "users"));

  usersDiv.innerHTML = "";

  snapshot.forEach((userDoc) => {
    const userData = userDoc.data();

    const name = userData.name || "User";
    const firstChar = name.charAt(0).toUpperCase();

    usersDiv.innerHTML += `
      <div style="
        width:90%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:10px;
        margin:5px auto;
        background:#fff;
        border-radius:12px;
        box-shadow:0 2px 6px rgba(0,0,0,0.1);
      ">

        <div style="display:flex;align-items:center;gap:10px;">

          <div style="
            width:40px;
            height:40px;
            border-radius:50%;
            background:#4CAF50;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
          ">
            ${firstChar}
          </div>

          <div>
            <div style="font-weight:bold;">
              ${name}
            </div>
            <div style="font-size:12px;opacity:.6;">
              مستخدم
            </div>
          </div>

        </div>

      <button onclick="openPrivateChat('${userDoc.id}', '${name}')"
  style="
    padding:6px 10px;
    background:#4CAF50;
    color:#fff;
    border:none;
    border-radius:8px;
  ">
  مراسلة
</button>  

      </div>
    `;
  });
}
  
// ================= OPEN PRIVATE CHAT =================
window.openPrivateChat = function (userId, userName) {

  if (!auth.currentUser) {
    alert("يجب تسجيل الدخول أولاً");
    return;
  }

  if (!userId) {
    alert("لم يتم اختيار مستخدم");
    return;
  }

  const myId = auth.currentUser.uid;

  currentChatId =
    myId < userId
      ? myId + "_" + userId
      : userId + "_" + myId;

  currentChatUser = userName;

  document.getElementById("chatBox").style.display = "block";

  listenPrivateMessages(currentChatId);

  setTimeout(() => {
    document.getElementById("msg").focus();
  }, 200);
};



// ================= SEND MESSAGE =================
window.sendMessage = async function () {

  const input = document.getElementById("msg");
  const text = input.value.trim();


  try {
    await addDoc(
      collection(db, "chats", currentChatId, "messages"),
      {
        text,
        user: auth.currentUser.email,
        name: auth.currentUser.email.split("@")[0],
        time: serverTimestamp()
      }
    );

    input.value = "";
    input.focus();

  } catch (error) {
    console.error("Send Error:", error);
    alert("حدث خطأ أثناء إرسال الرسالة");
  }
};



// ================= LISTEN MESSAGES =================
let unsubscribeMessages = null;

function listenPrivateMessages(chatId) {

  // إغلاق أي listener قديم
  if (unsubscribeMessages) {
    unsubscribeMessages();
    unsubscribeMessages = null;
  }

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time")
  );

  unsubscribeMessages = onSnapshot(q, (snapshot) => {

    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    snapshot.forEach((docSnap) => {

      const msg = docSnap.data();

      const isMe =
        auth.currentUser &&
        msg.user === auth.currentUser.email;

      let time = "";
      if (msg.time?.toDate) {
        const d = msg.time.toDate();
        time =
          d.getHours().toString().padStart(2, "0") +
          ":" +
          d.getMinutes().toString().padStart(2, "0");
      }
const senderName =
  (msg?.name && msg.name.trim())
    ? msg.name.trim()
    : "مستخدم";

const senderEmail =
  (msg?.user && msg.user.trim())
    ? msg.user.trim()
    : "";
     const messageText = msg.text || ""; 
      messagesDiv.innerHTML += `
  <div style="
    display:flex;
    justify-content:${isMe ? "flex-end" : "flex-start"};
    margin:8px 0;
  ">
    <div style="
      max-width:75%;
      padding:10px 12px;
      border-radius:${isMe ? "18px 18px 4px 18px" : "18px 18px 18px 4px"};
      background:${isMe ? "linear-gradient(135deg,#4CAF50,#45a049)" : "#e9e9eb"};
      color:${isMe ? "#fff" : "#000"};
      font-size:14px;
    ">
      <div style="font-size:11px;opacity:.7;margin-bottom:4px;">
        ${senderName} • ${time}
      </div>

      <div>${messageText}</div>
    </div>
  </div>
`;
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}
const msgInput = document.getElementById("msg");

if (msgInput) {
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();

      if (typeof window.sendMessage === "function") {
        window.sendMessage();
      }
    }
  });
}
  const msgInput = document.getElementById("msg");
  if (msgInput) {
    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        window.sendMessage();
      }
    });
  }
});  
</script>
</body>
</html>
