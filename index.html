<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توفير - Tofeer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <h1>تطبيق توفير</h1>
        <p>منصة تواصل بسيطة وسريعة.</p>
        <button class="btn" onclick="alert('أهلاً بك في توفير!')">ابدأ الدردشة</button>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
<div id="auth-container">
    <input type="tel" id="phoneNumber" placeholder="أدخل رقم الهاتف (مثال: +967...)">
    <button id="sendBtn">إرسال كود التحقق</button>

    <div id="verification-section" style="display:none;">
        <input type="text" id="verificationCode" placeholder="أدخل كود التحقق">
        <button id="verifyBtn">تأكيد الدخول</button>
    </div>
    
    <div id="recaptcha-container"></div>
</div>
<script type="module">
    import { sendVerificationCode, verifyCode } from "./جافا سكريب/auth.js"; // تأكد من مسار الملف
    import { getAuth, RecaptchaVerifier } from "firebase/auth";

    const auth = getAuth();
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

    let confirmationResult;

    document.getElementById('sendBtn').onclick = async () => {
        const phone = document.getElementById('phoneNumber').value;
        confirmationResult = await sendVerificationCode(phone, window.recaptchaVerifier);
        document.getElementById('verification-section').style.display = 'block';
        alert("تم إرسال الكود!");
    };

    document.getElementById('verifyBtn').onclick = async () => {
        const code = document.getElementById('verificationCode').value;
        const user = await verifyCode(confirmationResult, code);
        alert("تم تسجيل الدخول بنجاح!");
    };
</script>
