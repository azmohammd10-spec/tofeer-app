<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زر تيك توك</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef3f8;
padding-bottom:90px;
}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:75px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #eee;
}

/* ITEM */
.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:18px;
color:#777;
gap:3px;
}

.nav-item span{
font-size:11px;
}

/* ACTIVE */
.nav-item.active{
color:#111;
font-weight:700;
}

/* 🎯 TIKTOK STYLE BUTTON */
.camera-btn{
width:62px;
height:62px;
border-radius:18px;
border:none;

/* ✨ TikTok style gradient */
background:linear-gradient(135deg,#ff0050,#ff4ecd,#00f2ea);

color:#fff;
font-size:30px;
font-weight:700;

display:flex;
align-items:center;
justify-content:center;

/* shadow for depth */
box-shadow:
0 10px 25px rgba(0,0,0,.25),
0 0 15px rgba(255,0,80,.4);

position:relative;
top:-20px;
cursor:pointer;
transition:0.2s;
}

/* hover/press effect */
.camera-btn:active{
transform:scale(0.92);
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

</style>
</head>

<body>

<div class="bottom-nav">

  <div class="nav-item">💬<span>دردشه</span></div>

  <button class="camera-btn">＋</button>

  <div class="nav-item">👁<span>تحديثات</span></div>

</div>

</body>
</html>
