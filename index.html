<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Star Social</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding:30px;
    }

    .box{
      background:#fff;
      padding:20px;
      border-radius:12px;
      width:300px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:90%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:95%;
      padding:10px;
      background:#4CAF50;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#45a049;
    }

    #home{
      display:none;
    }
   #messages{
  scroll-behavior:smooth;
} 
  </style>
</head>
<body>
  <div id="home" style="display:none;">
  <h2>أهلاً بك: <span id="userInfo"></span></h2>
  <button onclick="logout()">تسجيل الخروج</button>
  
</div>
<h3>المستخدمون</h3>
<div id="usersList"></div>
<div id="chatBox" style="display:none; width:300px; margin:auto;">
  <h3>💬 الدردشة</h3>

  <div id="messages" style="height:300px; overflow-y:auto; background:#eee; padding:10px; border-radius:10px;"></div>

  <div id="chatBox" style="display:none; width:300px; margin:auto;">
  <h3>💬 الدردشة</h3>

  <div id="messages" style="
    height:300px;
    overflow-y:auto;
    background:#eee;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
  "></div>

  <!-- مربع الكتابة + زر الإرسال (محسن) -->
  <div style="display:flex; gap:6px;">
    <input type="text" id="msg" placeholder="اكتب رسالة..."
      style="
        flex:1;
        padding:10px;
        border-radius:20px;
        border:1px solid #ccc;
        outline:none;
      ">

    <button onclick="sendMessage()"
      style="
        width:50px;
        border-radius:50%;
        border:none;
        background:#4CAF50;
        color:#fff;
        font-size:18px;
        cursor:pointer;
      ">
      ➤
    </button>
  </div>
</div>

<button onclick="openChat()">فتح الدردشة</button>

<!-- تسجيل الدخول -->
<div class="box" id="login">
  <h2>تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCEuOcQIvg-chEXfwHM8JAxFeYGpaOIoP4",
  authDomain: "star-social-bdfb2.firebaseapp.com",
  projectId: "star-social-bdfb2",
  storageBucket: "star-social-bdfb2.firebasestorage.app",
  messagingSenderId: "256449419301",
  appId: "1:256449419301:web:970b4905d6beb86c4087cc",
  measurementId: "G-JYT3F33K7Y"
};
// Initialize Firebase
const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);
setPersistence(auth, browserLocalPersistence);  

// ================== AUTH ==================


window.login = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=> alert("تم تسجيل الدخول ✔"))
  .catch(err=> alert(err.message));
}

window.logout = function(){
  signOut(auth);
}
window.register = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
  .then(async (userCredential)=>{

    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      name: email.split("@")[0]
    });

    alert("تم إنشاء الحساب 🎉");
  })
  .catch(err=>{
    alert(err.message);
  });
}
// ================== USER STATE ==================
onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById("login").style.display = "none";
    document.getElementById("home").style.display = "block";
    document.getElementById("userInfo").innerText = user.email;

    loadUsers(); // هنا
  }else{
    document.getElementById("login").style.display = "block";
    document.getElementById("home").style.display = "none";
  }
});
  
async function loadUsers(){

  const usersDiv = document.getElementById("usersList");

  const snapshot = await getDocs(
    collection(db, "users")
  );

  usersDiv.innerHTML = "";

  snapshot.forEach((userDoc)=>{

    const userData = userDoc.data();

    usersDiv.innerHTML += `
      <div style="
        padding:10px;
        margin:5px;
        background:#fff;
        border-radius:10px;
        box-shadow:0 1px 5px rgba(0,0,0,.1);
      ">
        👤 ${userData.name}
      </div>
    `;
  });

}
// ================== CHAT ==================
window.openChat = function(){
  document.getElementById("chatBox").style.display = "block";

  // تركيز على مربع الكتابة مباشرة
  setTimeout(()=>{
    document.getElementById("msg").focus();
  }, 200);
}

window.sendMessage = async function(){

  let input = document.getElementById("msg");
  let text = input.value;

  if(text.trim() === "") return;

  if(!auth.currentUser){
    alert("يجب تسجيل الدخول أولاً");
    return;
  }

  try {
    await addDoc(collection(db, "messages"), {
      text: text,
      user: auth.currentUser.email,
      name: auth.currentUser.email.split("@")[0],
      time: serverTimestamp()
    });

    // تنظيف الحقل بعد الإرسال
    input.value = "";
    input.focus();

  } catch (error) {
    console.log(error);
    alert("حدث خطأ أثناء إرسال الرسالة");
  }
}

// عرض الرسائل
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot)=>{
  let messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML = "";

  snapshot.forEach((docSnap)=>{
    let msg = docSnap.data();

    let isMe = auth.currentUser && msg.user === auth.currentUser.email;

    let name = msg.user ? msg.user.split("@")[0] : "user";
onSnapshot(q, (snapshot)=>{
  const messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML = "";

  snapshot.forEach((docSnap)=>{
    const msg = docSnap.data();

    const isMe = auth.currentUser && msg.user === auth.currentUser.email;
    const name = msg.name || "user";

    // وقت الرسالة
    let time = "";
    if(msg.time?.toDate){
      const d = msg.time.toDate();
      time = d.getHours().toString().padStart(2,'0') + ":" +
             d.getMinutes().toString().padStart(2,'0');
    }

    messagesDiv.innerHTML += `
      <div style="
        display:flex;
        justify-content:${isMe ? 'flex-end' : 'flex-start'};
        margin:8px 0;
      ">
        <div style="
          max-width:75%;
          padding:10px 12px;
          border-radius:18px;
          background:${isMe ? '#4CAF50' : '#e9e9eb'};
          color:${isMe ? '#fff' : '#000'};
          font-size:14px;
          box-shadow:0 2px 6px rgba(0,0,0,0.08);
        ">
          <div style="font-size:11px; opacity:0.7; margin-bottom:3px;">
            ${name} • ${time}
          </div>
          <div style="word-wrap:break-word;">
            ${msg.text}
          </div>
        </div>
      </div>
    `;
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});
    
</script>
</body>
</html>
