<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}
  
body{
background:#eef2f7;
}

/* SCREEN WRAPPER */
.screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:12px;
}

/* LOGIN CARD */
.card{
width:85%;
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111827;
color:#fff;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1f2937;
}

/* APP */
#app{
display:none;
padding:20px;
}

.header{
font-size:20px;
font-weight:700;
margin-bottom:20px;
}

/* MESSAGE */
.msg{
background:#fff;
padding:10px;
margin:5px 0;
border-radius:10px;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN UI -->
<div id="login-screen" class="screen">

<div class="card">

<h2>تسجيل الدخول</h2>

<input id="phone" placeholder="رقم الهاتف +967...">

<button onclick="sendCode()">إرسال كود</button>

<input id="code" placeholder="كود التحقق">

<button id="loginBtn">تأكيد</button>

<div id="recaptcha"></div>

</div>

</div>

<div id="app">

  <!-- 📸 القصص -->
  <div class="section">
    <h3>📸 القصص</h3>
    <div class="story">قصة مستخدم 1 👁 1200</div>
    <div class="story">قصة مستخدم 2 👁 800</div>
  </div>

  <!-- 💬 الدردشات -->
  <div class="section">
    <h3>💬 الدردشات</h3>

    <div class="chat">
      <span>أحمد</span>
      <small>مرحبا 👋</small>
    </div>

    <div class="chat">
      <span>خالد</span>
      <small>شكراً لك</small>
    </div>
  </div>

  <!-- 👤 الحساب -->
  <div class="section">
    <h3>👤 الحساب</h3>
    <div class="profile">اسم المستخدم: محمد</div>
  </div>

</div>

<!-- ⚙️ FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
apiKey: "AIzaSyD39_c_pQml33APYKfw_Z_aF4iEPlcV-ts",
authDomain: "tofeer-e9c5a.firebaseapp.com",
projectId: "tofeer-e9c5a",
storageBucket: "tofeer-e9c5a.appspot.com",
messagingSenderId: "927174968674",
appId: "1:927174968674:web:5bafb6e43161c50cda983b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔐 reCAPTCHA (مهم جدًا) */
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha", {
size: "invisible"
}, auth);

window.recaptchaVerifier.render();

/* 📩 إرسال كود */
window.sendCode = async function(){
try{

const phone = document.getElementById("phone").value;

window.confirmationResult = await signInWithPhoneNumber(
auth,
phone,
window.recaptchaVerifier
);

alert("تم إرسال الكود");

}catch(e){
alert(e.message);
}
};

/* ✅ تأكيد الكود */
window.verifyCode = function () {
  alert("تم الضغط على زر الدخول");

  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
};

const code = document.getElementById("code").value;

await window.confirmationResult.confirm(code);

  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
};

const code = document.getElementById("code").value;

await window.confirmationResult.confirm(code);

alert("تم تسجيل الدخول");

/* UI SWITCH */
document.getElementById("login-screen").style.display = "none";
document.getElementById("app").style.display = "block";

loadMessages();
};

/* 💬 إرسال رسالة */
window.sendMsg = async function(){

let msg = document.getElementById("msg").value;
if(msg.trim()==="") return;

await addDoc(collection(db,"messages"),{
text:msg,
time:Date.now()
});

document.getElementById("msg").value="";
};

/* 🔥 عرض الرسائل لحظياً */
function loadMessages(){

const q = query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,(snap)=>{

let box = document.getElementById("chat-box");
box.innerHTML="";

snap.forEach(doc=>{
let m = doc.data();
box.innerHTML += `<div class="msg">${m.text}</div>`;
});

});

}
document.getElementById("loginBtn").addEventListener("click", function () {
  alert("تم الدخول");

  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
});
</script>

</body>
</html>
