<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق دردشة</title>

<style>
    /* ===== زر + الرئيسي ===== */
.plus-btn{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    width:62px;
    height:62px;
    border-radius:20px;
    background:linear-gradient(135deg,#00BFFF,#00E5FF);
    color:#fff;
    font-size:32px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,191,255,.35);
    z-index:2001;
    transition:0.2s ease;
    user-select:none;
}

.plus-btn:active{
    transform:translateX(-50%) scale(0.9);
    box-shadow:0 5px 15px rgba(0,191,255,.25);
}

/* ===== قائمة + ===== */
.plus-menu{
    position:fixed;
    bottom:95px;
    left:50%;
    transform:translateX(-50%);
    width:200px;
    background:#ffffff;
    border-radius:16px;
    border:1px solid #eee;
    display:none;
    flex-direction:column;
    overflow:hidden;
    z-index:3000;
    box-shadow:0 15px 35px rgba(0,0,0,0.12);
    backdrop-filter: blur(6px);
}

.plus-menu div{
    padding:14px;
    cursor:pointer;
    font-size:14px;
    transition:0.2s;
    text-align:center;
}

.plus-menu div:hover{
    background:#f5f5f5;
}

/* ===== الرسائل ===== */
.my-msg{
    align-self:flex-end;
    background:linear-gradient(135deg,#00BFFF,#0099FF);
    color:#fff;
    padding:10px 14px;
    border-radius:18px 18px 4px 18px;
    max-width:75%;
    word-break:break-word;
}

.other-msg{
    align-self:flex-start;
    background:#fff;
    border:1px solid #E6E6E6;
    padding:10px 14px;
    border-radius:18px 18px 18px 4px;
    max-width:75%;
    word-break:break-word;
}

/* ===== خلفية عامة ===== */
body{
    background:#F6F7F9;
    color:#2D3436;
    font-family:system-ui, 'Segoe UI', Tahoma;
}

    #sendBtn:active {
    transform: scale(0.9); /* الزر يصغر قليلاً عند الضغط عليه */
}

/* هذا التنسيق يفرض اللون الأخضر على الزر داخل صندوق الإدخال */
.input-box #sendBtn {
    background-color: #25d366 !important; 
}
  
  /* تأثير خفيف عند تمرير الفأرة (Hover) على المحادثة */
.chat:hover {
    border-right: 4px solid #00BFFF; /* خط سماوي خفيف يظهر بجانب المحادثة */
}

/* لون أيقونات التنقل في الأسفل */
.nav div {
    color: #555;
    transition: color 0.3s;
}
.nav div:hover {
    color: #00BFFF; /* الأيقونة تصبح سماوية عند الضغط عليها */
}

  /* تنسيق زر الميكروفون/الإرسال */
#sendBtn {
    width: 50px;
    height: 50px;
    border-radius: 50%; /* دائري تماماً */
    border: none;
    background-color: #25d366; /* لون أخضر واتساب */
    color: #000;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

  .emoji-box span{
cursor:pointer;
padding:4px;
display:inline-block;
}
  .emoji-box{
display:none;
padding:10px;
background:#fff;
border-top:1px solid #eee;
font-size:24px;
line-height:2;
}
  
.attach-btn,
.voice-btn,
.send-btn{
width:44px;
height:44px;
border:none;
border-radius:12px;
background:#f2f2f2;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#fff;
color:#111;
}

/* ===== CHAT LIST ===== */
#chatPage{
padding:70px 12px 90px;
}

.chat{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px;
border-bottom:1px solid #eee;
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:#ddd;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#777;margin-top:3px;}

/* CALL */
.call-btn{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:#f2f2f2;
cursor:pointer;
}

/* ===== CHAT ===== */
#chatDetail{
display:none;
position:fixed;
inset:0;
background:#fff;
flex-direction:column;
z-index:999;
}

.header{
height:55px;
display:flex;
align-items:center;
gap:10px;
padding:0 12px;
border-bottom:1px solid #eee;
}

.back-btn{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:#f2f2f2;
cursor:pointer;
}

/* messages */
#messages{
flex:1;
padding:12px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}


/* input */
.input-box{
display:flex;
gap:8px;
padding:10px;
border-top:1px solid #eee;
}

.input-box input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#f7f7f7;
border-radius:10px;
}

/* ===== STORIES ===== */
#stories{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:2000;
}

/* زر رجوع */
.story-back{
position:absolute;
top:15px;
left:15px;
width:40px;
height:40px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.15);
color:#fff;
font-size:20px;
cursor:pointer;
}

/* أزرار القصص */
.story-actions{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:25px;
}

.story-actions div{
font-size:26px;
color:#fff;
}

/* ===== NAV ===== */
.nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:65px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #eee;
    z-index: 1000; /* لضمان بقائه فوق كل شيء */
}

.nav div{
    font-size:22px;
    cursor:pointer;
}

</style>
</head>
<body>

<!-- CHAT LIST -->
<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="left">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>
<button class="call-btn">📞</button>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="left">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>
<button class="call-btn">📞</button>
</div>

</div>

<!-- CHAT -->
<div id="chatDetail">

<div class="header">
<button class="back-btn" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages"></div>

<div class="input-box">
    <button class="attach-btn">🖼️</button>
    <button class="emoji-btn" onclick="toggleEmoji()">😀</button>
    
    <input id="msgInput" oninput="toggleButton()" placeholder="اكتب رسالة...">

    <button id="sendBtn" onclick="send()">🎙️</button>

</div>

  <div id="emojiBox" class="emoji-box">
<span>😀</span>
<span>😂</span>
<span>😍</span>
<span>😎</span>
<span>😢</span>
<span>😡</span>
<span>👍</span>
<span>❤️</span>
<span>💔</span>
<span>🔥</span>
<span>🎉</span>
<span>😁</span>
<span>🤔</span>
<span>😴</span>
<span>😘</span>
<span>😭</span>
</div>
</div>
<!-- STORIES -->
<div id="stories">
    <button class="story-back" onclick="closeStories()">←</button>

    <div class="story-actions">
        <div onclick="console.log('تم الإعجاب بالقصة')">❤</div>
        <div onclick="console.log('فتح قائمة المشاهدات')">👁</div>
    </div>
</div>


<div id="plusMenu" class="plus-menu" style="display:none;">
    <div onclick="openCameraApp()">📸 كاميرا (تجميل)</div>
    <div onclick="document.getElementById('fileInput').click()">🖼️ استوديو</div>
</div>

<script>
    // 1. التنقل بين الصفحات
    function openChat(name){
        document.getElementById("chatPage").style.display="none";
        document.getElementById("chatDetail").style.display="flex";
        document.getElementById("chatName").innerText=name;
        document.getElementById("msgInput").focus();
    }

    function closeChat(){
        document.getElementById("chatDetail").style.display="none";
        document.getElementById("chatPage").style.display="block";
    }

    function showChats(){
        document.getElementById("stories").style.display="none";
        document.getElementById("chatDetail").style.display="none";
        document.getElementById("chatPage").style.display="block";
    }

    function showStories(){
        document.getElementById("chatPage").style.display="none";
        document.getElementById("chatDetail").style.display="none";
        document.getElementById("stories").style.display="block";
    }

    function closeStories(){
        document.getElementById("stories").style.display="none";
        document.getElementById("chatPage").style.display="block";
    }

    // 2. التحكم في الزر الذكي (الميكروفون/الإرسال)
    function toggleButton() {
    const input = document.getElementById("msgInput");
    const btn = document.getElementById("sendBtn");

    if(input.value.trim() !== ""){
        btn.innerHTML = "➤";
        btn.style.background = "#00BFFF";
        btn.style.color = "#fff";
    }else{
        btn.innerHTML = "🎙️";
        btn.style.background = "#25d366";
        btn.style.color = "#fff";
    }
}

    // 3. الإرسال
    function send(){
        let input = document.getElementById("msgInput");
        if(input.value.trim() !== ""){
            let msg = document.createElement("div");
            msg.className = "my-msg";
            msg.innerText = input.value;
            document.getElementById("messages").appendChild(msg);
            input.value = "";
            toggleButton();
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        }
    }

    // 4. الإيموجي
    function toggleEmoji(){
        let box = document.getElementById("emojiBox");
        box.style.display = (box.style.display === "block") ? "none" : "block";
    }

    // 5. فتح وإغلاق القائمة
    function togglePlusMenu() {
        let menu = document.getElementById("plusMenu");
        menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
    }

    // تشغيل الكاميرا
    function openCameraApp() {
        let camInput = document.createElement('input');
        camInput.type = 'file';
        camInput.accept = 'image/*';
        camInput.capture = 'user'; 
        camInput.click();
        togglePlusMenu(); 
    }

    // معالجة الملفات
    function handleFile(event) {
        let file = event.target.files[0];
        if (file) {
            alert("تم اختيار الملف: " + file.name);
            togglePlusMenu();
        }
    }
document.getElementById("msgInput").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        send();
    }
});    
</script>
<div class="nav">
    <div onclick="showChats()">💬</div>
    <div class="plus-btn" onclick="togglePlusMenu()">+</div>
    <div onclick="showStories()">👁</div>
</div>

<input type="file" id="fileInput" style="display:none" accept="image/*,video/*" onchange="handleFile(event)">

</body>
</html>
