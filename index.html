<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#ffffff;
color:#111;
}

/* ===== TOP SEARCH ===== */
.top-bar{
position:fixed;
top:0;
left:0;
width:100%;
padding:10px;
background:#fff;
border-bottom:1px solid #e6f3ff;
z-index:1000;
}

.top-bar input{
width:100%;
padding:10px;
border:none;
outline:none;
background:#f2f9ff;
border-radius:12px;
}

/* ===== CHAT LIST ===== */
#chatPage{
padding:70px 12px 90px;
}

.chat{
display:flex;
align-items:center;
gap:12px;
background:#fff;
padding:14px;
margin-bottom:10px;
border-radius:14px;
border:1px solid #e6f3ff;
cursor:pointer;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:#d9efff;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#666;margin-top:3px;}

/* ===== CHAT ===== */
#chatDetail{
display:none;
position:fixed;
inset:0;
background:#fff;
flex-direction:column;
z-index:999;
}

.header{
height:55px;
display:flex;
align-items:center;
gap:10px;
padding:0 12px;
border-bottom:1px solid #e6f3ff;
}

.back{
width:36px;
height:36px;
border:none;
border-radius:10px;
background:#e8f4ff;
cursor:pointer;
}

#messages{
flex:1;
padding:12px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:#d9efff;
padding:10px 14px;
border-radius:14px 14px 4px 14px;
max-width:75%;
}

.other-msg{
align-self:flex-start;
background:#f6fbff;
padding:10px 14px;
border-radius:14px 14px 14px 4px;
border:1px solid #e6f3ff;
max-width:75%;
}

/* ===== STORIES (BLACK LIKE TIKTOK) ===== */
#stories{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:2000;
}

/* ===== PLUS BUTTON (TIKTOK STYLE) ===== */
.plus-btn{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:70px;
height:50px;
border-radius:18px;
background:linear-gradient(135deg,#ffffff,#cfe9ff);
border:2px solid #bfe3ff;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:900;
box-shadow:0 12px 25px rgba(0,0,0,.18);
cursor:pointer;
transition:.2s;
}

.plus-btn:active{
transform:translateX(-50%) scale(0.92);
}

/* ===== NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #e6f3ff;
}

.nav div{
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- SEARCH -->
<div class="top-bar">
<input id="searchInput" oninput="searchChats()" placeholder="ابحث...">
</div>

<!-- CHAT LIST -->
<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>

</div>

<!-- CHAT -->
<div id="chatDetail">

<div class="header">
<button class="back" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages"></div>

<div class="input-box" style="display:flex;gap:8px;padding:10px;border-top:1px solid #e6f3ff;">
<input id="msgInput" style="flex:1;padding:10px;border:none;outline:none;background:#f2f9ff;border-radius:10px;" placeholder="اكتب رسالة...">
<button onclick="send()" style="padding:10px 14px;border:none;background:#d9efff;border-radius:10px;">إرسال</button>
</div>

</div>

<!-- STORIES -->
<div id="stories"></div>

<!-- PLUS BUTTON (TIKTOK STYLE MAIN FOCUS) -->

<!-- NAV -->
<div class="nav">
<div onclick="showChats()">💬</div>
  
  <div class="plus-btn">+</div>

<div onclick="showStories()">👁</div>
</div>

<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("chatPage").style.display="block";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="none";
}

function showStories(){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="block";
}

function send(){
let input=document.getElementById("msgInput");
if(input.value.trim()!==""){
let msg=document.createElement("div");
msg.className="my-msg";
msg.innerText=input.value;
document.getElementById("messages").appendChild(msg);
input.value="";
}
}

function searchChats(){
let val=document.getElementById("searchInput").value.toLowerCase();
document.querySelectorAll(".chat").forEach(c=>{
let name=c.querySelector(".name").innerText.toLowerCase();
c.style.display=name.includes(val)?"flex":"none";
});
}

</script>

</body>
</html>
