<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#f4f4f4;
color:#111;
}

/* ===== TOP SEARCH ===== */
.top-bar{
position:fixed;
top:0;
left:0;
width:100%;
padding:10px;
background:#fff;
border-bottom:1px solid #e5e5e5;
z-index:1000;
}

.top-bar input{
width:100%;
padding:10px;
border:none;
outline:none;
background:#f0f0f0;
border-radius:10px;
}

/* ===== CHAT LIST ===== */
#chatPage{
padding:70px 12px 90px;
}

.chat{
display:flex;
align-items:center;
gap:12px;
background:#fff;
padding:14px;
margin-bottom:10px;
border-radius:14px;
border:1px solid #eaeaea;
cursor:pointer;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:#ddd;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#777;margin-top:3px;}

/* ===== CHAT SCREEN ===== */
#chatDetail{
display:none;
position:fixed;
inset:0;
background:#f4f4f4;
flex-direction:column;
z-index:999;
}

.header{
height:55px;
background:#fff;
display:flex;
align-items:center;
gap:10px;
padding:0 12px;
border-bottom:1px solid #e5e5e5;
}

.back{
width:36px;
height:36px;
border:none;
border-radius:10px;
background:#eee;
cursor:pointer;
}

#messages{
flex:1;
padding:12px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:#e8e8e8;
padding:10px 14px;
border-radius:14px 14px 4px 14px;
max-width:75%;
}

.other-msg{
align-self:flex-start;
background:#fff;
padding:10px 14px;
border-radius:14px 14px 14px 4px;
max-width:75%;
border:1px solid #eaeaea;
}

/* ===== INPUT ===== */
.input-box{
display:flex;
gap:8px;
padding:10px;
background:#fff;
border-top:1px solid #e5e5e5;
}

.input-box input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#f0f0f0;
border-radius:10px;
}

.input-box button{
padding:10px 14px;
border:none;
background:#ddd;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

/* ===== STORIES (GRAY SIMPLE) ===== */
#stories{
display:none;
position:fixed;
inset:0;
background:#f4f4f4;
z-index:1000;
}

/* ===== BOTTOM NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #e5e5e5;
}

.nav div{
font-size:22px;
cursor:pointer;
}

/* ===== MODERN + BUTTON (IMPORTANT) ===== */
.plus-btn{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:62px;
height:62px;
background:linear-gradient(135deg,#ffffff,#dddddd);
border:1px solid #dcdcdc;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:900;
box-shadow:0 10px 25px rgba(0,0,0,.12);
cursor:pointer;
transition:.2s;
}

.plus-btn:active{
transform:translateX(-50%) scale(0.95);
}
</style>
</head>

<body>

<!-- SEARCH -->
<div class="top-bar">
<input id="searchInput" oninput="searchChats()" placeholder="ابحث...">
</div>

<!-- CHAT LIST -->
<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً</div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>

</div>

<!-- CHAT -->
<div id="chatDetail">

<div class="header">
<button class="back" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages"></div>

<div class="input-box">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="send()">إرسال</button>
</div>

</div>

<!-- STORIES -->
<div id="stories"></div>

<!-- PLUS BUTTON (MAIN FOCUS) -->
<div class="plus-btn">+</div>

<!-- NAV -->
<div class="nav">
<div onclick="showChats()">💬</div>
<div onclick="showStories()">👁</div>
</div>

<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("chatPage").style.display="block";
document.getElementById("chatDetail").style.display="none";
}

function showStories(){
document.getElementById("stories").style.display="block";
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="none";
}

function send(){
let input=document.getElementById("msgInput");
if(input.value.trim()!==""){
let msg=document.createElement("div");
msg.className="my-msg";
msg.innerText=input.value;
document.getElementById("messages").appendChild(msg);
input.value="";
}
}

function searchChats(){
let val=document.getElementById("searchInput").value.toLowerCase();
let chats=document.querySelectorAll(".chat");

chats.forEach(c=>{
let name=c.querySelector(".name").innerText.toLowerCase();
c.style.display=name.includes(val)?"flex":"none";
});
}

</script>

</body>
</html>
