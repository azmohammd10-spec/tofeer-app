<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Star Social</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding:30px;
    }

    .box{
      background:#fff;
      padding:20px;
      border-radius:12px;
      width:300px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:90%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:95%;
      padding:10px;
      background:#4CAF50;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#45a049;
    }

    #home{
      display:none;
    }
  </style>
</head>
<body>
<div id="chatBox" style="display:none; width:300px; margin:auto;">
  <h3>💬 الدردشة</h3>

  <div id="messages" style="height:300px; overflow-y:auto; background:#eee; padding:10px; border-radius:10px;"></div>

  <input type="text" id="msg" placeholder="اكتب رسالة..." style="width:80%; padding:10px;">
  <button onclick="sendMessage()">إرسال</button>
</div>

<button onclick="openChat()">فتح الدردشة</button>
<div class="box" id="login">
  <h2>تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>
</div>

<script type="module">
 import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"; 
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

import { 
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { 
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCEuOcQIvg-chEXfwHM8JAxFeYGpaOIoP4",
  authDomain: "star-social-bdfb2.firebaseapp.com",
  projectId: "star-social-bdfb2",
  storageBucket: "star-social-bdfb2.firebasestorage.app",
  messagingSenderId: "256449419301",
  appId: "1:256449419301:web:970b4905d6beb86c4087cc",
  measurementId: "G-JYT3F33K7Y"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);

// ================== AUTH ==================


window.login = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=> alert("تم تسجيل الدخول ✔"))
  .catch(err=> alert(err.message));
}

window.logout = function(){
  signOut(auth);
}
window.register = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
  .then(async (userCredential)=>{

    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      name: email.split("@")[0]
    });

    alert("تم إنشاء الحساب 🎉");
  })
  .catch(err=>{
    alert(err.message);
  });
}
// ================== USER STATE ==================
onAuthStateChanged(auth, (user)=>{
  if(user){
    document.getElementById("login").style.display = "none";
    document.getElementById("home").style.display = "block";
    document.getElementById("userInfo").innerText = user.email;
  }else{
    document.getElementById("login").style.display = "block";
    document.getElementById("home").style.display = "none";
  }
});

// ================== CHAT ==================
window.openChat = function(){
  document.getElementById("chatBox").style.display = "block";

  // تركيز على مربع الكتابة مباشرة
  setTimeout(()=>{
    document.getElementById("msg").focus();
  }, 200);
}

window.sendMessage = async function(){

  let input = document.getElementById("msg");
  let text = input.value;

  if(text.trim() === "") return;

  if(!auth.currentUser){
    alert("يجب تسجيل الدخول أولاً");
    return;
  }

  try {
    await addDoc(collection(db, "messages"), {
      text: text,
      user: auth.currentUser.email,
      name: auth.currentUser.email.split("@")[0],
      time: serverTimestamp()
    });

    // تنظيف الحقل بعد الإرسال
    input.value = "";
    input.focus();

  } catch (error) {
    console.log(error);
    alert("حدث خطأ أثناء إرسال الرسالة");
  }
}

// عرض الرسائل
const q = query(collection(db, "messages"), orderBy("time"));
onSnapshot(q, (snapshot)=>{
  let messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML = "";

  snapshot.forEach((doc)=>{
    let msg = doc.data();

    let isMe = auth.currentUser && msg.user === auth.currentUser.email;

    let name = msg.user ? msg.user.split("@")[0] : "user";

    messagesDiv.innerHTML += `
      <div style="
        display:flex;
        justify-content:${isMe ? 'flex-end' : 'flex-start'};
        margin:6px 0;
      ">
        <div style="
          max-width:70%;
          padding:10px 12px;
          border-radius:18px;
          background:${isMe ? '#4CAF50' : '#e5e5e5'};
          color:${isMe ? 'white' : 'black'};
          font-size:14px;
        ">
          <div style="font-weight:bold; font-size:12px; opacity:0.7;">
            ${name}
          </div>
          <div>${msg.text}</div>
        </div>
      </div>
    `;
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

</script>
