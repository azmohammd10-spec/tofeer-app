 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق توفير</title>
    <style>
        /* التنسيقات العامة */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; }

        /* شاشة تسجيل الدخول */
        #login { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { width: 90%; max-width: 400px; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 14px; margin-top: 10px; border: 1px solid #ddd; border-radius: 12px; outline: none; }
        button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 12px; background: #007bff; color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }

        /* هيكل التطبيق */
        #app { display: none; height: 100vh; flex-direction: column; }
        .header { background: #fff; padding: 15px 20px; font-weight: 700; text-align: center; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        /* قائمة المحادثات */
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { background: #fff; margin-bottom: 10px; padding: 18px; border-radius: 12px; border: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #f9f9f9; }

        /* واجهة المحادثة */
        #chatBox { display: none; flex-direction: column; height: 100vh; background: #fff; }
         { flex: 1; padding: 20px; overflow-y: auto; background: #fcfcfc; }
        .msg { background: #007bff; color: white; padding: 10px 15px; margin: 8px 0; border-radius: 15px; max-width: 80%; width: fit-content; }
        .input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #eee; }
        .input-area input { margin: 0; border-radius: 20px; }
        .input-area button { width: 80px; margin-right: 10px; }
        .back-btn { cursor: pointer; color: #007bff; font-weight: bold; }
    </style>
</head>

<body>

<div id="login">
    <div class="card">
        <h3>تسجيل الدخول</h3>
        <input id="name" placeholder="أدخل اسمك">
        <button onclick="login()">دخول</button>
    </div>
</div>

<div id="app">
    <div class="header">
        <span>توفير 💬</span>
    </div>

    <div class="chat-list" id="chatList">
        <div class="chat-item" onclick="openChat('أحمد')">👤 أحمد</div>
        <div class="chat-item" onclick="openChat('خالد')">👤 خالد</div>
    </div>

    <div id="chatBox">
        <div class="header">
            <span class="back-btn" onclick="closeChat()">← رجوع</span>
            <span id="chatTitle">المحادثة</span>
            <span></span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input id="msg" placeholder="اكتب رسالتك...">
            <button onclick="sendMsg()">إرسال</button>
        </div>
    </div>
</div>

<script>
    let user = "";

    function login() {
        user = document.getElementById("name").value;
        if (!user) return alert("يرجى كتابة الاسم");
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "flex";
    }

    function openChat(name) {
        document.getElementById("chatList").style.display = "none";
        document.getElementById("chatBox").style.display = "flex";
        document.getElementById("chatTitle").innerText = name;
        document.getElementById("messages").innerHTML = "";
    }

    function closeChat() {
        document.getElementById("chatList").style.display = "block";
        document.getElementById("chatBox").style.display = "none";
    }

    function sendMsg() {
        let input = document.getElementById("msg");
        if (!input.value) return;
        document.getElementById("messages").innerHTML += `<div class="msg">${input.value}</div>`;
        input.value = "";
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    }
</script>

</body>
</html>
