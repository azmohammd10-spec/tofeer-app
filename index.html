<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق دردشة</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#fff;
color:#111;
}

/* ===== CHAT LIST ===== */
#chatPage{
padding:70px 12px 90px;
}

.chat{
display:flex;
align-items:center;
justify-content:space-between;
background:#fff;
padding:14px;
border-bottom:1px solid #eee;
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
background:#ddd;
}

.name{font-weight:700;}
.msg{font-size:13px;color:#777;margin-top:3px;}

/* CALL BUTTON */
.call-btn{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:#f2f2f2;
font-size:18px;
cursor:pointer;
}

/* ===== CHAT ===== */
#chatDetail{
display:none;
position:fixed;
inset:0;
background:#fff;
flex-direction:column;
z-index:999;
}

.header{
height:55px;
display:flex;
align-items:center;
gap:10px;
padding:0 12px;
border-bottom:1px solid #eee;
}

.back-btn{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:#f2f2f2;
cursor:pointer;
font-size:18px;
}

#messages{
flex:1;
padding:12px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:#f2f2f2;
padding:10px 14px;
border-radius:14px;
max-width:75%;
}

.other-msg{
align-self:flex-start;
background:#fff;
border:1px solid #eee;
padding:10px 14px;
border-radius:14px;
max-width:75%;
}

/* INPUT */
.input-box{
display:flex;
gap:8px;
padding:10px;
border-top:1px solid #eee;
}

.input-box input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#f7f7f7;
border-radius:10px;
}

.input-box button{
padding:10px 14px;
border:none;
background:#eee;
border-radius:10px;
}

/* ===== STORIES ===== */
#stories{
display:none;
position:fixed;
inset:0;
background:#fff;
z-index:2000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.story-content{
font-size:22px;
color:#111;
}

/* ===== NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #eee;
}

.nav div{
font-size:22px;
cursor:pointer;
}

/* PLUS BUTTON */
.plus-btn{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:65px;
height:50px;
border-radius:16px;
background:#f2f2f2;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:900;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
cursor:pointer;
}
</style>
</head>

<body>

<!-- CHAT LIST -->
<div id="chatPage">

<div class="chat">
<div class="left">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>

<button class="call-btn">📞</button>
</div>

<div class="chat">
<div class="left">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>

<button class="call-btn">📞</button>
</div>

</div>

<!-- CHAT -->
<div id="chatDetail">

<div class="header">
<button class="back-btn" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages"></div>

<div class="input-box">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="send()">إرسال</button>
</div>

</div>

<!-- STORIES -->
<div id="stories">

<style>
#stories{
position:fixed;
inset:0;
background:#000;
}

/* زر الرجوع */
.back-btn{
position:absolute;
top:15px;
left:15px;
width:40px;
height:40px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:#fff;
font-size:20px;
cursor:pointer;
}

/* الأزرار يمين وسط */
.story-actions{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

.story-actions div{
font-size:26px;
color:#fff;
opacity:0.9;
}
</style>

<!-- زر رجوع -->
<button class="back-btn" onclick="closeStories()">←</button>

<!-- الأزرار -->
<div class="story-actions">
<div>❤</div>
<div>👁</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="showChats()">💬</div>
  <div class="plus-btn">+</div>
<div onclick="showStories()">👁</div>
</div>


<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("stories").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showStories(){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="block";
}

function closeStories(){
document.getElementById("stories").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function send(){
let input=document.getElementById("msgInput");
if(input.value.trim()!==""){
let msg=document.createElement("div");
msg.className="my-msg";
msg.innerText=input.value;
document.getElementById("messages").appendChild(msg);
input.value="";
}
}

</script>

</body>
</html>
