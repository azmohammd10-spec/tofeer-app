  <!-- ===== التصميم (CSS) – يبقى كما هو دون تغيير ===== -->
  <style>
    /* كل الـ CSS الخاص بك موجود هنا – لم نغيّره */
    :root {
      --primary: #0084ff;
      --primary-dark: #0066cc;
      --secondary: #00c6ff;
      --bg-app: #f5f7fa;
      --bg-messages: #e5ddd5;
      --bg-header: #f8f9fa;
      --bubble-sent: linear-gradient(135deg, #dcf8c6, #b9e8a0);
      --bubble-received: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #555;
      --text-light: #888;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      --radius: 25px;
      --radius-bubble: 18px;
      --nav-height: 65px;
      --header-height: 60px;
      --transition: 0.3s ease;
      --font-size-base: 16px;
    }
    [data-theme="dark"] {
      --bg-app: #121212;
      --bg-messages: #1e1e1e;
      --bg-header: #2a2a2a;
      --bubble-sent: linear-gradient(135deg, #2d4a1e, #1f3a12);
      --bubble-received: #3a3a3a;
      --text-primary: #eee;
      --text-secondary: #bbb;
      --text-light: #888;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
    }
    body {
      background: var(--bg-app);
      color: var(--text-primary);
      font-size: var(--font-size-base);
      line-height: 1.5;
      height: 100dvh;
      overflow: hidden;
    }
    #app {
      position: relative;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .page {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(var(--nav-height) + 10px);
      background: var(--bg-app);
    }
    .page.active {
      display: flex;
      flex-direction: column;
    }
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      background: var(--bg-header);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .nav-btn {
      flex: 1;
      text-align: center;
      padding: 8px 0 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: color var(--transition);
      position: relative;
      border: none;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .nav-btn span {
      font-size: 24px;
      line-height: 1;
    }
    .nav-btn.active-nav {
      color: var(--primary);
    }
    .nav-btn.active-nav::after {
      content: "";
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 3px;
      border-radius: 10px;
      background: var(--primary);
    }
    /* باقي الأنماط كما هي (تم حذفها للاختصار ولكنها موجودة في الأصل) */
    /* ... */

</head>

  <!-- ================================================================ -->
  <!--  كل الجافاسكربت الجديد – 5 نجوم، آمن، مهيكل، جاهز للتوسع        -->
  <!-- ================================================================ -->
  <script>
    (function() {
      'use strict';

      // =================================================================
      //  1.  UTILS (أدوات مساعدة عامة)
      // =================================================================
      const Utils = {
        /** توليد معرف فريد (ID) */
        generateId() {
          return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
        },

        /** تنقية النص من أي محتوى ضار (للاستخدام الآمن) */
        sanitize(text) {
          if (typeof text !== 'string') return '';
          return DOMPurify.sanitize(text, { ALLOWED_TAGS: [], ALLOWED_ATTR: [] });
        },

        /** تنقية HTML (نادراً ما تستخدم، لكن للحالات الخاصة) */
        sanitizeHTML(html) {
          return DOMPurify.sanitize(html);
        },

        /** تنسيق الوقت من timestamp */
        formatTime(timestamp) {
          return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        },

        /** إيموجي افتراضي للصورة الرمزية حسب الاسم */
        getAvatarEmoji(name) {
          const map = { 'أحمد': '😎', 'خالد': '🧑‍💻', 'سارة': '👩‍🦰' };
          return map[name] || '👤';
        },

        /** حالة عشوائية للعرض */
        getRandomStatus() {
          const statuses = ['متصل الآن', 'آخر ظهور منذ دقيقة', 'يكتب...', 'شوهد منذ 5 دقائق'];
          return statuses[Math.floor(Math.random() * statuses.length)];
        },

        /** التحقق من صحة الملف (النوع والحجم) */
        validateFile(file) {
          const maxSize = 10 * 1024 * 1024; // 10 ميجابايت
          if (file.size > maxSize) {
            return { valid: false, message: 'حجم الملف يتجاوز 10 ميجابايت' };
          }
          const allowedTypes = ['image/', 'video/', 'audio/'];
          if (!allowedTypes.some(t => file.type.startsWith(t))) {
            return { valid: false, message: 'نوع الملف غير مدعوم' };
          }
          return { valid: true };
        },

        /** تحويل ملف إلى Base64 (للتخزين في IndexedDB) */
        fileToBase64(file) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
        }
      };

      // =================================================================
      //  2.  DATA MANAGER (إدارة التخزين: IndexedDB + localStorage)
      //      هذه الطبقة يمكن استبدالها بـ API خارجي دون تغيير باقي الكود
      // =================================================================
      class DataManager {
        constructor() {
          this.dbName = 'ChatAppDB';
          this.dbVersion = 3; // زيادة الإصدار لتحديث الهيكل
          this.db = null;
          this._initPromise = null;
        }

        /** تهيئة قاعدة البيانات (IndexedDB) */
        async _initDB() {
          if (this.db) return this.db;
          if (this._initPromise) return this._initPromise;

          this._initPromise = new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, this.dbVersion);
            request.onupgradeneeded = (e) => {
              const db = e.target.result;
              // حذف المتاجر القديمة إذا وجدت (لإعادة الإنشاء بشكل نظيف)
              if (db.objectStoreNames.contains('files')) db.deleteObjectStore('files');
              if (db.objectStoreNames.contains('messages')) db.deleteObjectStore('messages');
              if (db.objectStoreNames.contains('stories')) db.deleteObjectStore('stories');

              // إنشاء المتاجر بالفهارس المناسبة
              const fileStore = db.createObjectStore('files', { keyPath: 'id' });
              fileStore.createIndex('createdAt', 'createdAt', { unique: false });

              const msgStore = db.createObjectStore('messages', { keyPath: 'id' });
              msgStore.createIndex('chatId', 'chatId', { unique: false });
              msgStore.createIndex('createdAt', 'createdAt', { unique: false });
              msgStore.createIndex('senderId', 'senderId', { unique: false });

              const storyStore = db.createObjectStore('stories', { keyPath: 'id' });
              storyStore.createIndex('createdAt', 'createdAt', { unique: false });
              storyStore.createIndex('userId', 'userId', { unique: false });
            };
            request.onsuccess = (e) => {
              this.db = e.target.result;
              resolve(this.db);
            };
            request.onerror = (e) => reject(e.target.error);
          });
          return this._initPromise;
        }

        /** داخلي: إضافة أو تحديث سجل */
        async _store(storeName, data) {
          await this._initDB();
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            const req = store.put(data);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }

        /** داخلي: جلب سجل بالمعرف */
        async _get(storeName, id) {
          await this._initDB();
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            const req = store.get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }

        /** داخلي: حذف سجل بالمعرف */
        async _delete(storeName, id) {
          await this._initDB();
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            const req = store.delete(id);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
          });
        }

        /** داخلي: جلب كل السجلات (مع إمكانية الفهرسة) */
        async _getAll(storeName, indexName = null, key = null) {
          await this._initDB();
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            let req;
            if (indexName && key !== null) {
              const index = store.index(indexName);
              req = index.getAll(key);
            } else {
              req = store.getAll();
            }
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }

        // ===== عمليات الملفات =====
        async saveFile(file) {
          const id = Utils.generateId();
          const fileData = {
            id,
            name: file.name,
            type: file.type,
            size: file.size,
            data: await Utils.fileToBase64(file),
            createdAt: Date.now()
          };
          await this._store('files', fileData);
          return id;
        }

        async getFile(id) {
          const fileData = await this._get('files', id);
          return fileData ? fileData.data : null;
        }

        async deleteFile(id) {
          await this._delete('files', id);
        }

        // ===== عمليات الرسائل =====
        async saveMessage(message) {
          const msg = {
            ...message,
            id: message.id || Utils.generateId(),
            createdAt: message.createdAt || Date.now()
          };
          await this._store('messages', msg);
          return msg;
        }

        async getMessages(chatId) {
          const all = await this._getAll('messages', 'chatId', chatId);
          return all.sort((a, b) => a.createdAt - b.createdAt);
        }

        async getAllMessages() {
          return await this._getAll('messages');
        }

        async deleteMessage(id) {
          await this._delete('messages', id);
        }

        // ===== عمليات القصص =====
        async saveStory(story) {
          const s = {
            ...story,
            id: story.id || Utils.generateId(),
            createdAt: story.createdAt || Date.now()
          };
          await this._store('stories', s);
          return s;
        }

        async getStories() {
          const all = await this._getAll('stories');
          return all.sort((a, b) => b.createdAt - a.createdAt);
        }

        async deleteStory(id) {
          await this._delete('stories', id);
        }

        // ===== الملف الشخصي (يُخزَّن في localStorage للسرعة) =====
        static getProfile() {
          try {
            const raw = localStorage.getItem('profile');
            if (!raw) {
              const def = DataManager.defaultProfile();
              DataManager.saveProfile(def);
              return def;
            }
            const data = JSON.parse(raw);
            // التأكد من وجود userId
            if (!data.userId) {
              data.userId = Utils.generateId();
              DataManager.saveProfile(data);
            }
            // التأكد من وجود الحقول الأساسية
            const def = DataManager.defaultProfile();
            ['name', 'status', 'avatar', 'phone', 'email'].forEach(key => {
              if (typeof data[key] !== 'string') data[key] = def[key];
            });
            return data;
          } catch {
            const def = DataManager.defaultProfile();
            DataManager.saveProfile(def);
            return def;
          }
        }

        static saveProfile(profile) {
          localStorage.setItem('profile', JSON.stringify(profile));
        }

        static defaultProfile() {
          return {
            userId: Utils.generateId(),
            name: 'مستخدم',
            status: 'متصل الآن',
            avatar: '👤',
            phone: '+966 50 000 0000',
            email: 'user@example.com'
          };
        }

        static getTheme() {
          return localStorage.getItem('theme') || 'light';
        }

        static saveTheme(theme) {
          localStorage.setItem('theme', theme);
        }

        // ===== ترقية البيانات القديمة (من localStorage القديم) =====
        static async migrateOldData(dataManager) {
          const profile = DataManager.getProfile();
          // 1. ترقية المحادثات القديمة
          try {
            const oldChats = localStorage.getItem('chats');
            if (oldChats) {
              const chats = JSON.parse(oldChats);
              for (const chatId in chats) {
                const msgs = chats[chatId];
                for (const m of msgs) {
                  const newMsg = {
                    chatId: chatId,
                    text: m.text || '',
                    senderId: m.sender === 'me' ? profile.userId : 'other_' + chatId,
                    senderName: m.sender === 'me' ? profile.name : chatId,
                    status: 'delivered',
                    createdAt: m.time ? new Date('1970-01-01T' + m.time + ':00').getTime() : Date.now(),
                    fileId: null,
                    media: m.media || null,
                    mediaType: m.type || null
                  };
                  await dataManager.saveMessage(newMsg);
                }
              }
              localStorage.removeItem('chats');
              console.log('✅ تم ترقية المحادثات القديمة');
            }
          } catch (e) { console.warn('ترقية المحادثات فشلت:', e); }

          // 2. ترقية القصص القديمة
          try {
            const oldStories = localStorage.getItem('stories');
            if (oldStories) {
              const stories = JSON.parse(oldStories);
              for (const s of stories) {
                const newStory = {
                  url: s.url,
                  type: s.type || 'image',
                  username: s.username || 'مستخدم',
                  userId: profile.userId, // جميع القصص القديمة تصبح مملوكة للمستخدم الحالي
                  text: s.text || '',
                  filename: s.filename || '',
                  startTime: s.startTime || 0,
                  endTime: s.endTime || 0,
                  createdAt: Date.now()
                };
                await dataManager.saveStory(newStory);
              }
              localStorage.removeItem('stories');
              console.log('✅ تم ترقية القصص القديمة');
            }
          } catch (e) { console.warn('ترقية القصص فشلت:', e); }
        }
      }

      // =================================================================
      //  3.  PROFILE MODULE (إدارة الملف الشخصي)
      // =================================================================
      class ProfileModule {
        constructor() {
          this.profile = DataManager.getProfile();
          this._renderUI();
        }

        getUserId() {
          return this.profile.userId;
        }

        getUserName() {
          return this.profile.name;
        }

        /** عرض الملف الشخصي في الواجهة */
        _renderUI() {
          document.getElementById('profileName').textContent = this.profile.name;
          document.getElementById('profileStatus').textContent = this.profile.status;
          document.getElementById('profilePhone').textContent = this.profile.phone;
          document.getElementById('profileEmail').textContent = this.profile.email;
          document.getElementById('avatarPreview').textContent = this.profile.avatar || '👤';
        }

        /** تعديل الملف الشخصي */
        edit() {
          const name = prompt('اسم المستخدم:', this.profile.name);
          if (name && name.trim()) this.profile.name = Utils.sanitize(name.trim());
          const status = prompt('الحالة:', this.profile.status);
          if (status !== null) this.profile.status = Utils.sanitize(status.trim()) || 'متصل الآن';
          const phone = prompt('رقم الهاتف:', this.profile.phone);
          if (phone !== null) this.profile.phone = Utils.sanitize(phone.trim());
          const email = prompt('البريد الإلكتروني:', this.profile.email);
          if (email !== null) this.profile.email = Utils.sanitize(email.trim());
          DataManager.saveProfile(this.profile);
          this._renderUI();
        }

        /** تغيير الصورة الرمزية (إيموجي) */
        changeAvatar() {
          const emojis = ['👤', '😊', '😎', '👩', '🧑', '👨', '💼', '🌟', '🦊', '🐱', '🐶', '🐼'];
          const choice = prompt('اختر إيموجي لصورتك (أدخل الرقم):\n' + emojis.map((e, i) => i + 1 + ': ' + e).join('\n'));
          if (choice && !isNaN(choice) && choice > 0 && choice <= emojis.length) {
            this.profile.avatar = emojis[choice - 1];
            DataManager.saveProfile(this.profile);
            this._renderUI();
          }
        }

        /** تبديل الثيم (وضع ليلي / عادي) */
        toggleTheme() {
          const current = document.documentElement.getAttribute('data-theme');
          if (current === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            DataManager.saveTheme('light');
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            DataManager.saveTheme('dark');
          }
        }

        /** تسجيل الخروج (مسح البيانات) */
        logout() {
          if (confirm('هل تريد تسجيل الخروج؟ سيتم مسح بياناتك المحلية.')) {
            localStorage.clear();
            // حذف IndexedDB بالكامل (اختياري)
            indexedDB.deleteDatabase('ChatAppDB');
            alert('تم تسجيل الخروج. تحديث الصفحة...');
            location.reload();
          }
        }
      }

      // =================================================================
      //  4.  CHAT MODULE (إدارة الدردشات)
      // =================================================================
      class ChatModule {
        constructor(dataManager, profileModule) {
          this.dataManager = dataManager;
          this.profile = profileModule;
          this.activeChatId = null;
          this.fileInput = document.getElementById('fileInput');
          this.messageInput = document.getElementById('messageInput');
          this.sendButton = document.getElementById('sendButton');
          this.messagesContainer = document.getElementById('messages');
          this.chatListContainer = document.getElementById('chatList');
          this.modal = document.getElementById('chatModal');
          this.chatNameEl = document.getElementById('chatName');
          this.chatAvatarEl = document.getElementById('chatAvatar');
          this.chatStatusEl = document.getElementById('chatStatus');
          this.recognition = null;
          this.isRecording = false;
          this._setupListeners();
        }

        /** ربط الأحداث الأساسية */
        _setupListeners() {
          this.fileInput.addEventListener('change', (e) => this._handleFileUpload(e.target.files));
          this.messageInput.addEventListener('input', () => this._updateSendIcon());
          this.messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.handleSend();
          });
          this.sendButton.addEventListener('click', () => this.handleSend());
        }

        /** عرض قائمة الدردشات */
        async renderChatList() {
          const container = this.chatListContainer;
          container.innerHTML = '';
          const allMessages = await this.dataManager.getAllMessages();
          // استخراج معرفات الدردشات الفريدة
          const chatIds = [...new Set(allMessages.map(m => m.chatId))];
          if (chatIds.length === 0) {
            // إضافة محادثات افتراضية
            const defaultNames = ['أحمد', 'خالد', 'سارة'];
            defaultNames.forEach(name => {
              if (!chatIds.includes(name)) chatIds.push(name);
            });
          }

          // ترتيب حسب آخر رسالة (الأحدث أولاً)
          chatIds.sort((a, b) => {
            const msgsA = allMessages.filter(m => m.chatId === a);
            const msgsB = allMessages.filter(m => m.chatId === b);
            const lastA = msgsA.length ? msgsA[msgsA.length - 1].createdAt : 0;
            const lastB = msgsB.length ? msgsB[msgsB.length - 1].createdAt : 0;
            return lastB - lastA;
          });

          for (const chatId of chatIds) {
            const msgs = allMessages.filter(m => m.chatId === chatId);
            const last = msgs.length ? msgs[msgs.length - 1] : null;
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.dataset.chatId = chatId;

            // الجزء الأيسر (الصورة + الاسم + آخر رسالة)
            const leftDiv = document.createElement('div');
            leftDiv.className = 'left';
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            avatarDiv.textContent = Utils.getAvatarEmoji(chatId);
            const infoDiv = document.createElement('div');
            infoDiv.className = 'info';
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.textContent = Utils.sanitize(chatId);
            const lastMsgDiv = document.createElement('div');
            lastMsgDiv.className = 'last-msg';
            lastMsgDiv.textContent = last ? Utils.sanitize(last.text) : 'ابدأ المحادثة';
            infoDiv.appendChild(nameDiv);
            infoDiv.appendChild(lastMsgDiv);
            leftDiv.appendChild(avatarDiv);
            leftDiv.appendChild(infoDiv);
            div.appendChild(leftDiv);

            // الوقت
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time';
            timeDiv.textContent = last ? Utils.formatTime(last.createdAt) : '';
            div.appendChild(timeDiv);

            div.addEventListener('click', () => this.openChat(chatId));
            container.appendChild(div);
          }
        }

        /** فتح محادثة */
        async openChat(chatId) {
          if (this.activeChatId === chatId && this.modal.classList.contains('open')) return;
          this.activeChatId = chatId;
          this.modal.classList.add('open');
          this.chatNameEl.textContent = chatId;
          this.chatAvatarEl.textContent = Utils.getAvatarEmoji(chatId);
          this.chatStatusEl.textContent = Utils.getRandomStatus();
          await this.renderMessages(chatId);
          this.messageInput.focus();
        }

        /** إغلاق المحادثة */
        closeChat() {
          this.modal.classList.remove('open');
          this.activeChatId = null;
          if (this.recognition && this.recognition.listening) this.recognition.stop();
          this.sendButton.classList.remove('recording');
          this._updateSendIcon();
        }

        /** عرض الرسائل داخل المحادثة */
        async renderMessages(chatId) {
          if (!chatId) chatId = this.activeChatId;
          if (!chatId) return;
          const msgs = await this.dataManager.getMessages(chatId);
          const container = this.messagesContainer;
          container.innerHTML = '';
          const fragment = document.createDocumentFragment();
          const avatar = Utils.getAvatarEmoji(chatId);
          const myUserId = this.profile.getUserId();

          for (const m of msgs) {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper';
            const isSent = m.senderId === myUserId;
            wrapper.classList.add(isSent ? 'sent' : 'received');

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar-msg';
            avatarDiv.textContent = avatar;
            if (isSent) avatarDiv.style.display = 'none';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            // النص
            const textSpan = document.createElement('span');
            textSpan.textContent = m.text || '';
            bubble.appendChild(textSpan);

            // الملفات (إن وجدت)
            if (m.fileId) {
              const fileData = await this.dataManager.getFile(m.fileId);
              if (fileData) {
                if (m.mediaType === 'image') {
                  const img = document.createElement('img');
                  img.src = fileData;
                  img.alt = 'صورة';
                  img.style.cssText = 'max-width:100%;border-radius:10px;margin-top:6px;';
                  bubble.appendChild(img);
                } else if (m.mediaType === 'video') {
                  const vid = document.createElement('video');
                  vid.src = fileData;
                  vid.controls = true;
                  vid.style.cssText = 'max-width:100%;border-radius:10px;margin-top:6px;';
                  bubble.appendChild(vid);
                } else if (m.mediaType === 'audio') {
                  const aud = document.createElement('audio');
                  aud.src = fileData;
                  aud.controls = true;
                  aud.style.cssText = 'width:100%;margin-top:6px;';
                  bubble.appendChild(aud);
                }
              }
            } else if (m.media) {
              // توافق مع البيانات القديمة
              if (m.mediaType === 'image') {
                const img = document.createElement('img');
                img.src = m.media;
                img.alt = 'صورة';
                img.style.cssText = 'max-width:100%;border-radius:10px;margin-top:6px;';
                bubble.appendChild(img);
              } else if (m.mediaType === 'video') {
                const vid = document.createElement('video');
                vid.src = m.media;
                vid.controls = true;
                vid.style.cssText = 'max-width:100%;border-radius:10px;margin-top:6px;';
                bubble.appendChild(vid);
              } else if (m.mediaType === 'audio') {
                const aud = document.createElement('audio');
                aud.src = m.media;
                aud.controls = true;
                aud.style.cssText = 'width:100%;margin-top:6px;';
                bubble.appendChild(aud);
              }
            }

            // الوقت والحالة
            const statusSpan = document.createElement('span');
            statusSpan.className = 'time';
            let statusIcon = '';
            if (isSent) {
              if (m.status === 'sent') statusIcon = '✓';
              else if (m.status === 'delivered') statusIcon = '✓✓';
              else if (m.status === 'read') statusIcon = '✓✓✓';
            }
            statusSpan.textContent = `${Utils.formatTime(m.createdAt)} ${statusIcon}`;
            bubble.appendChild(statusSpan);

            wrapper.appendChild(avatarDiv);
            wrapper.appendChild(bubble);
            fragment.appendChild(wrapper);
          }
          container.appendChild(fragment);
          container.scrollTop = container.scrollHeight;
        }

        /** إرسال رسالة (نص أو ملف) */
        async sendMessage(text, file = null) {
          if (!this.activeChatId) return;
          let fileId = null;
          let mediaType = null;
          if (file) {
            const validation = Utils.validateFile(file);
            if (!validation.valid) {
              alert(validation.message);
              return;
            }
            fileId = await this.dataManager.saveFile(file);
            mediaType = file.type.startsWith('image') ? 'image' :
              file.type.startsWith('video') ? 'video' : 'audio';
          }

          const msg = {
            chatId: this.activeChatId,
            text: Utils.sanitize(text || ''),
            senderId: this.profile.getUserId(),
            senderName: this.profile.getUserName(),
            status: 'sent',
            fileId: fileId,
            mediaType: mediaType,
            createdAt: Date.now()
          };
          await this.dataManager.saveMessage(msg);
          await this.renderMessages(this.activeChatId);
          await this.renderChatList();

          // محاكاة وصول الرسالة (delivered)
          setTimeout(async () => {
            msg.status = 'delivered';
            await this.dataManager.saveMessage(msg);
            if (this.activeChatId === msg.chatId) await this.renderMessages(this.activeChatId);
          }, 1000);

          // محاكاة رد من الطرف الآخر (عشوائي)
          this._simulateReply(this.activeChatId);
        }

        /** محاكاة رد من الطرف الآخر */
        async _simulateReply(chatId) {
          const replies = ['مرحباً!', 'كيف الحال؟', 'شكراً لك', '❤️', 'ممتاز!', 'أنا بخير', '😂', '👍'];
          const delay = 1500 + Math.random() * 2000;
          setTimeout(async () => {
            const reply = replies[Math.floor(Math.random() * replies.length)];
            const msg = {
              chatId: chatId,
              text: reply,
              senderId: 'other_' + chatId,
              senderName: chatId,
              status: 'delivered',
              createdAt: Date.now()
            };
            await this.dataManager.saveMessage(msg);
            if (this.activeChatId === chatId) {
              await this.renderMessages(chatId);
              // محاكاة قراءة الرسالة
              setTimeout(async () => {
                msg.status = 'read';
                await this.dataManager.saveMessage(msg);
                if (this.activeChatId === chatId) await this.renderMessages(chatId);
              }, 1000);
            }
            await this.renderChatList();
            // إشعار إذا كان المتصفح في الخلفية
            if (document.hidden) {
              App.notify(chatId, reply);
            }
          }, delay);
        }

        /** معالجة رفع الملف */
        async _handleFileUpload(files) {
          if (!files || !files.length) return;
          const file = files[0];
          await this.sendMessage('', file);
          this.fileInput.value = '';
        }

        /** بدء التسجيل الصوتي */
        startRecording() {
          if (this.isRecording) return;
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (!SpeechRecognition) {
            alert('المتصفح لا يدعم التعرف على الصوت. استخدم Chrome أو Edge.');
            return;
          }
          this.recognition = new SpeechRecognition();
          this.recognition.lang = 'ar-AR';
          this.recognition.continuous = false;
          this.recognition.interimResults = false;

          this.sendButton.classList.add('recording');
          this.isRecording = true;

          this.recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            this.messageInput.value = transcript;
            this.sendMessage(transcript);
            this.messageInput.value = '';
            this._updateSendIcon();
          };
          this.recognition.onerror = (event) => {
            console.error('خطأ في التسجيل:', event.error);
            alert('خطأ في التسجيل: ' + event.error);
            this._stopRecordingUI();
          };
          this.recognition.onend = () => this._stopRecordingUI();
          this.recognition.start();
        }

        /** إيقاف واجهة التسجيل */
        _stopRecordingUI() {
          this.isRecording = false;
          this.sendButton.classList.remove('recording');
          this._updateSendIcon();
        }

        /** تحديث أيقونة زر الإرسال (ميكروفون / سهم) */
        _updateSendIcon() {
          const hasText = this.messageInput.value.trim().length > 0;
          const icon = document.getElementById('sendIcon');
          if (hasText) {
            icon.innerHTML = `<path d="M2 21L23 12L2 3V10L17 12L2 14V21Z" fill="white"/>`;
          } else {
            icon.innerHTML = `
              <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z" stroke="white" stroke-width="2"/>
              <path d="M19 11a7 7 0 0 1-14 0" stroke="white" stroke-width="2"/>
              <path d="M12 18v3" stroke="white" stroke-width="2"/>
            `;
          }
        }

        /** معالجة الضغط على زر الإرسال */
        handleSend() {
          const text = this.messageInput.value.trim();
          if (text) {
            this.sendMessage(text);
            this.messageInput.value = '';
            this._updateSendIcon();
          } else {
            this.startRecording();
          }
        }

        /** إضافة صديق جديد (محاكاة) */
        async addFriend() {
          const name = prompt('أدخل اسم الصديق:');
          if (name && name.trim()) {
            const clean = Utils.sanitize(name.trim());
            const allMessages = await this.dataManager.getAllMessages();
            const exists = allMessages.some(m => m.chatId === clean);
            if (!exists) {
              const welcome = {
                chatId: clean,
                text: 'بدأت المحادثة',
                senderId: 'other_' + clean,
                senderName: clean,
                status: 'delivered',
                createdAt: Date.now()
              };
              await this.dataManager.saveMessage(welcome);
              await this.renderChatList();
              alert(`تمت إضافة ${clean} إلى الدردشات.`);
            } else {
              alert('هذه المحادثة موجودة بالفعل.');
            }
          }
        }
      }

      // =================================================================
      //  5.  STORIES MODULE (إدارة القصص)
      // =================================================================
      class StoriesModule {
        constructor(dataManager, profileModule) {
          this.dataManager = dataManager;
          this.profile = profileModule;
          this.feed = document.getElementById('storyFeed');
          this.stories = [];
          this.observer = null;
          this.videoHandlers = new Map(); // لتخزين مستمعي timeupdate وإزالتها
          this._setupUI();
        }

        /** ربط الأحداث (يتم في App لاحقاً) */
        _setupUI() { /* تُربط من App */ }

        /** تحميل القصص من قاعدة البيانات */
        async loadStories() {
          this.stories = await this.dataManager.getStories();
          this.render();
        }

        /** عرض القصص في الواجهة */
        render() {
          this.feed.innerHTML = '';
          if (!this.stories.length) {
            this.feed.innerHTML =
              `<div style="color:#fff;text-align:center;margin-top:40%;font-size:20px;">📸 لا توجد قصص حالياً</div>`;
            return;
          }

          const fragment = document.createDocumentFragment();
          const myUserId = this.profile.getUserId();

          this.stories.forEach((story, index) => {
            const item = document.createElement('div');
            item.className = 'story-item';
            item.dataset.storyId = story.id;
            item.style.display = index === 0 ? 'flex' : 'none';

            const isOwner = (story.userId === myUserId);

            // ---- بناء المحتوى حسب النوع ----
            if (story.type === 'text') {
              const div = document.createElement('div');
              div.style.cssText =
                'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2d3436,#636e72);padding:40px;';
              const textDiv = document.createElement('div');
              textDiv.style.cssText =
                'color:#fff;font-size:32px;text-align:center;font-weight:700;text-shadow:0 4px 20px rgba(0,0,0,0.5);';
              textDiv.textContent = story.text || '';
              div.appendChild(textDiv);
              item.appendChild(div);
            } else if (story.type === 'video') {
              const video = document.createElement('video');
              video.id = `storyVideo-${story.id}`;
              video.src = story.url;
              video.autoplay = true;
              video.loop = true;
              video.playsInline = true;
              video.muted = true;

              // تطبيق القص (start/end)
              if (story.startTime || story.endTime) {
                video.addEventListener('loadedmetadata', () => {
                  video.currentTime = story.startTime || 0;
                  const handler = () => {
                    if (story.endTime && video.currentTime >= story.endTime) {
                      video.pause();
                      video.currentTime = story.startTime || 0;
                      video.play();
                    }
                  };
                  video.addEventListener('timeupdate', handler);
                  this.videoHandlers.set(story.id, { video, handler });
                });
              }
              item.appendChild(video);

              // زر كتم الصوت
              const muteBtn = document.createElement('button');
              muteBtn.className = 'mute-btn';
              muteBtn.textContent = '🔇';
              muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                muteBtn.textContent = video.muted ? '🔇' : '🔊';
              });
              item.appendChild(muteBtn);

              // زر قص (للمالك فقط)
              if (isOwner) {
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.textContent = '✂️';
                editBtn.addEventListener('click', () => this.openEditModal(index));
                item.appendChild(editBtn);
              }
            } else if (story.type === 'music') {
              const container = document.createElement('div');
              container.style.cssText =
                'width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:40px;';
              const icon = document.createElement('div');
              icon.style.cssText = 'font-size:80px;margin-bottom:20px;';
              icon.textContent = '🎵';
              const nameDiv = document.createElement('div');
              nameDiv.style.cssText = 'color:#fff;font-size:24px;font-weight:700;text-align:center;';
              nameDiv.textContent = story.filename || 'مقطع موسيقي';
              const audio = document.createElement('audio');
              audio.controls = true;
              audio.style.cssText = 'margin-top:20px;width:80%;max-width:400px;';
              audio.src = story.url;
              container.appendChild(icon);
              container.appendChild(nameDiv);
              container.appendChild(audio);
              item.appendChild(container);
            } else {
              // صورة
              const img = document.createElement('img');
              img.src = story.url;
              img.alt = 'قصة';
              img.loading = 'lazy';
              item.appendChild(img);
            }

            // زر الحذف (للمالك فقط)
            if (isOwner) {
              const deleteBtn = document.createElement('button');
              deleteBtn.className = 'delete-btn';
              deleteBtn.textContent = '✕';
              deleteBtn.addEventListener('click', () => this.deleteStory(index));
              item.appendChild(deleteBtn);
            }

            // اسم المستخدم والوقت (للكل)
            const usernameDiv = document.createElement('div');
            usernameDiv.className = 'story-username';
            usernameDiv.textContent = story.username || 'مستخدم';
            item.appendChild(usernameDiv);

            const timeDiv = document.createElement('div');
            timeDiv.className = 'story-time';
            timeDiv.textContent = Utils.formatTime(story.createdAt);
            item.appendChild(timeDiv);

            fragment.appendChild(item);
          });

          this.feed.appendChild(fragment);
          this._setupObserver();
          this._playVisibleVideos();
        }

        /** إعداد مراقب الفيديوهات (IntersectionObserver) */
        _setupObserver() {
          if (this.observer) {
            this.observer.disconnect();
            // إزالة كل مستمعات timeupdate المعلقة
            for (const [id, { video, handler }] of this.videoHandlers) {
              video.removeEventListener('timeupdate', handler);
            }
            this.videoHandlers.clear();
          }
          if (!('IntersectionObserver' in window)) return;
          this.observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              const video = entry.target.querySelector('video');
              if (!video) return;
              const storyId = entry.target.dataset.storyId;
              if (entry.isIntersecting) {
                video.play().catch(() => {});
              } else {
                video.pause();
                // إزالة مستمع timeupdate لمنع التسرب
                if (storyId && this.videoHandlers.has(storyId)) {
                  const { handler } = this.videoHandlers.get(storyId);
                  video.removeEventListener('timeupdate', handler);
                  this.videoHandlers.delete(storyId);
                }
              }
            });
          }, { threshold: 0.3 });
          document.querySelectorAll('.story-item').forEach(item => this.observer.observe(item));
        }

        /** تشغيل الفيديوهات المرئية يدوياً (لأول مرة) */
        _playVisibleVideos() {
          document.querySelectorAll('.story-item').forEach(item => {
            if (item.style.display !== 'none') {
              const video = item.querySelector('video');
              if (video) video.play().catch(() => {});
            }
          });
        }

        /** إنشاء قصة جديدة */
        async createStory(file, type = 'image', text = '') {
          let url = '';
          let fileId = null;
          if (file) {
            const validation = Utils.validateFile(file);
            if (!validation.valid) {
              alert(validation.message);
              return;
            }
            fileId = await this.dataManager.saveFile(file);
            url = await this.dataManager.getFile(fileId);
          }
          const story = {
            url: url,
            type: type,
            text: text || '',
            username: this.profile.getUserName(),
            userId: this.profile.getUserId(),
            filename: file ? file.name : '',
            startTime: 0,
            endTime: 0,
            createdAt: Date.now()
          };
          const saved = await this.dataManager.saveStory(story);
          this.stories.unshift(saved);
          this.render();
          if (type === 'video') {
            setTimeout(() => this.openEditModal(0), 500);
          }
        }

        /** حذف قصة (مع التحقق من الملكية) */
        async deleteStory(index) {
          const story = this.stories[index];
          if (!story) return;
          if (story.userId !== this.profile.getUserId()) {
            alert('لا يمكنك حذف قصة ليست ملكك.');
            return;
          }
          if (!confirm('هل تريد حذف هذه القصة؟')) return;
          await this.dataManager.deleteStory(story.id);
          this.stories.splice(index, 1);
          this.render();
        }

        /** فتح نافذة تعديل الفيديو (القص) – للمالك فقط */
        openEditModal(index) {
          const story = this.stories[index];
          if (!story) return;
          if (story.userId !== this.profile.getUserId()) {
            alert('لا يمكنك تعديل قصة ليست ملكك.');
            return;
          }
          if (story.type !== 'video') return alert('يمكن قص الفيديوهات فقط.');
          alert('✂️ وظيفة القص قيد التطوير. سيتم إضافتها قريباً بواجهة متقدمة.');
        }

        // ===== واجهات إنشاء القصص (تُستدعى من HTML) =====
        openCamera() {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'image/*,video/*';
          input.capture = 'environment';
          input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const type = file.type.startsWith('video') ? 'video' : 'image';
            await this.createStory(file, type);
            this.closeGallery();
          };
          input.click();
        }

        openGalleryPicker() {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'image/*,video/*';
          input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const type = file.type.startsWith('video') ? 'video' : 'image';
            await this.createStory(file, type);
            this.closeGallery();
          };
          input.click();
        }

        createTextStory() {
          const text = prompt('أدخل نص القصة:');
          if (!text) return;
          this.createStory(null, 'text', text.trim());
          this.closeGallery();
        }

        createCelebrationStory() {
          const celebrations = ['🎉 حفلة رائعة!', '🎂 عيد ميلاد سعيد!', '🥳 سنة جديدة سعيدة!', '🎊 تهانينا!',
            '💪 إنجاز جديد!'
          ];
          const text = celebrations[Math.floor(Math.random() * celebrations.length)];
          this.createStory(null, 'text', text);
          this.closeGallery();
        }

        createMusicStory() {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'audio/*';
          input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            await this.createStory(file, 'music');
            this.closeGallery();
          };
          input.click();
        }

        // ===== نوافذ (تظهر/تخفي) =====
        openMyStories() {
          document.getElementById('myStoriesModal').classList.add('open');
        }
        closeMyStories() {
          document.getElementById('myStoriesModal').classList.remove('open');
        }
        openGallery() {
          this.closeMyStories();
          document.getElementById('galleryModal').classList.add('open');
        }
        closeGallery() {
          document.getElementById('galleryModal').classList.remove('open');
        }

        // ===== تفاعلات وهمية (للأزرار الجانبية) =====
        like() { alert('❤️ تم الإعجاب بالقصة!'); }
        view() { alert('👁️ تم مشاهدة القصة!'); }
        share() { alert('♻️ تم مشاركة القصة!'); }
        download() { alert('⬇️ يتم تحميل القصة...'); }
      }

      // =================================================================
      //  6.  APP (التطبيق الرئيسي – يربط كل الوحدات)
      // =================================================================
      class App {
        constructor() {
          this.dataManager = new DataManager();
          this.profileModule = new ProfileModule();
          this.chat = new ChatModule(this.dataManager, this.profileModule);
          this.stories = new StoriesModule(this.dataManager, this.profileModule);
          this.currentPage = 0;
          this.pageIds = ['chatPage', 'storiesPage', 'profilePage'];
          this._setupNavigation();
          this._setupSwipe();
          this._setupGlobalListeners();
          this._init();
        }

        /** التهيئة: ترقية البيانات، تحميل المحتوى، استعادة الثيم */
        async _init() {
          await DataManager.migrateOldData(this.dataManager);
          await this.chat.renderChatList();
          await this.stories.loadStories();
          const theme = DataManager.getTheme();
          if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
          this.navigateTo(0);
          if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
          }
          console.log('🚀 التطبيق جاهز! (UserId:', this.profileModule.getUserId(), ')');
        }

        /** ربط أزرار التنقل */
        _setupNavigation() {
          document.querySelectorAll('.nav-btn').forEach((btn, i) => {
            btn.addEventListener('click', () => this.navigateTo(i));
          });
        }

        /** التنقل بين الصفحات */
        navigateTo(index) {
          if (index < 0 || index >= this.pageIds.length) return;
          this.currentPage = index;
          document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
          document.getElementById(this.pageIds[index]).classList.add('active');
          document.querySelectorAll('.nav-btn').forEach((btn, i) => {
            btn.classList.toggle('active-nav', i === index);
          });
          if (index !== 0) this.chat.closeChat();
          if (index !== 1) {
            if (this.stories.observer) this.stories.observer.disconnect();
          }
          if (index === 1) {
            this.stories.loadStories();
          }
          if (index === 2) {
            this.profileModule._renderUI();
          }
        }

        /** نظام السحب بين الصفحات (Swipe) */
        _setupSwipe() {
          let startX = 0,
            startY = 0,
            currentX = 0,
            isSwiping = false;
          document.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            startX = t.clientX;
            startY = t.clientY;
            currentX = startX;
            isSwiping = false;
          }, { passive: true });

          document.addEventListener('touchmove', (e) => {
            if (e.touches.length !== 1) return;
            const t = e.touches[0];
            const diffX = startX - t.clientX;
            const diffY = startY - t.clientY;
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
              e.preventDefault();
              isSwiping = true;
              currentX = t.clientX;
            }
          }, { passive: false });

          document.addEventListener('touchend', () => {
            if (!isSwiping) return;
            const diff = startX - currentX;
            if (Math.abs(diff) < 40) return;
            if (diff > 0 && this.currentPage < this.pageIds.length - 1) {
              this.navigateTo(this.currentPage + 1);
            } else if (diff < 0 && this.currentPage > 0) {
              this.navigateTo(this.currentPage - 1);
            }
            isSwiping = false;
          }, { passive: true });
        }

        /** ربط الدوال العالمية (لتكون متاحة من HTML) */
        _setupGlobalListeners() {
          window.navigateTo = (i) => this.navigateTo(i);
          window.openChat = (name) => this.chat.openChat(name);
          window.closeChat = () => this.chat.closeChat();
          window.handleSend = () => this.chat.handleSend();
          window.addFriend = () => this.chat.addFriend();
          window.renderStories = () => this.stories.loadStories();
          window.openMyStories = () => this.stories.openMyStories();
          window.closeMyStories = () => this.stories.closeMyStories();
          window.openGallery = () => this.stories.openGallery();
          window.closeGallery = () => this.stories.closeGallery();
          window.openCamera = () => this.stories.openCamera();
          window.openGalleryPicker = () => this.stories.openGalleryPicker();
          window.createTextStory = () => this.stories.createTextStory();
          window.createCelebrationStory = () => this.stories.createCelebrationStory();
          window.createMusicStory = () => this.stories.createMusicStory();
          window.deleteStory = (i) => this.stories.deleteStory(i);
          window.openEditModal = (i) => this.stories.openEditModal(i);
          window.likeStory = () => this.stories.like();
          window.viewStory = () => this.stories.view();
          window.shareStory = () => this.stories.share();
          window.downloadStory = () => this.stories.download();
          window.editProfile = () => this.profileModule.edit();
          window.changeAvatar = () => this.profileModule.changeAvatar();
          window.toggleTheme = () => this.profileModule.toggleTheme();
          window.logout = () => this.profileModule.logout();
        }

        /** إشعارات (تُستدعى من Chat عند ورود رسالة والخلفية غير نشطة) */
        static notify(sender, text) {
          if (!('Notification' in window) || Notification.permission !== 'granted') return;
          const now = Date.now();
          if (now - App._lastNotificationTime < 3000) return; // منع التكرار السريع
          App._lastNotificationTime = now;
          new Notification(`📩 ${sender}`, {
            body: text,
            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>'
          });
        }
      }
      App._lastNotificationTime = 0;

      // =================================================================
      //  7.  تشغيل التطبيق بعد تحميل الصفحة
      // =================================================================
      document.addEventListener('DOMContentLoaded', () => {
        window.app = new App();
      });

    })();
  </script>
</body>
</html>
