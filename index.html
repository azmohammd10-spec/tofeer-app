<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Star Social</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding:30px;
    }

    .box{
      background:#fff;
      padding:20px;
      border-radius:12px;
      width:300px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:90%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:95%;
      padding:10px;
      background:#4CAF50;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#45a049;
    }

    #home{
      display:none;
    }
   #messages{
  scroll-behavior:smooth;
} 
  
  </style>
</head>
<body>
  <div id="home" style="display:none;">
  <h2>أهلاً بك: <span id="userInfo"></span></h2>
  <button onclick="logout()">تسجيل الخروج</button>
  
</div>
<h3>المستخدمون</h3>
<div id="usersList"></div>
<div id="chatBox" style="display:none; width:300px; margin:auto;">
  <h3>💬 الدردشة</h3>

  <div id="messages" style="
    height:300px;
    overflow-y:auto;
    background:#eee;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
  "></div>

  <div style="display:flex; gap:6px;">
    <input type="text" id="msg" placeholder="اكتب رسالة..."
      style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;">

    <button onclick="sendMessage()"
      style="width:50px; border-radius:50%; border:none; background:#4CAF50; color:#fff;">
      ➤
    </button>
  </div>
</div>

<!-- تسجيل الدخول -->
<div class="box" id="login">
  <h2>تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// ================== GLOBALS ==================
let currentChatId = null;
let currentChatUser = null;
let unsubscribeMessages = null;

// ================== FIREBASE ==================
const firebaseConfig = {
  apiKey: "AIzaSyCEu...",
  authDomain: "star-social-bdfb2.firebaseapp.com",
  projectId: "star-social-bdfb2",
  storageBucket: "star-social-bdfb2.firebasestorage.app",
  messagingSenderId: "256449419301",
  appId: "1:256449419301:web:970b4905d6beb86c4087cc",
  measurementId: "G-JYT3F33K7Y"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);

setPersistence(auth, browserLocalPersistence);

// ================== LOGIN ==================
window.login = function () {
  const email = emailEl().value.trim();
  const password = passEl().value.trim();

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("تم تسجيل الدخول"))
    .catch(err => alert(err.message));
};

window.register = function () {
  const email = emailEl().value.trim();
  const password = passEl().value.trim();

  createUserWithEmailAndPassword(auth, email, password)
    .then(async (user) => {
      await setDoc(doc(db, "users", user.user.uid), {
        email: user.user.email,
        name: email.split("@")[0]
      });

      alert("تم إنشاء الحساب");
    })
    .catch(err => alert(err.message));
};

window.logout = function () {
  if (unsubscribeMessages) unsubscribeMessages();
  signOut(auth);
};

// ================== AUTH STATE ==================
onAuthStateChanged(auth, (user) => {

  const loginBox = document.getElementById("login");
  const homeBox = document.getElementById("home");

  if (user) {
    loginBox.style.display = "none";
    homeBox.style.display = "block";
    document.getElementById("userInfo").innerText = user.email;

    if (!window.usersLoaded) {
      window.usersLoaded = true;
      loadUsers();
    }

  } else {
    loginBox.style.display = "block";
    homeBox.style.display = "none";
    window.usersLoaded = false;
  }
});

// ================== USERS ==================
async function loadUsers() {
  const usersDiv = document.getElementById("usersList");

  const snap = await getDocs(collection(db, "users"));

  usersDiv.innerHTML = "";

  snap.forEach(docu => {
    const u = docu.data();
    const name = u.name || "User";

    usersDiv.innerHTML += `
      <div style="margin:10px;padding:10px;background:#fff;border-radius:10px">
        <b>${name}</b>
        <button onclick="openPrivateChat('${docu.id}','${name}')">مراسلة</button>
      </div>
    `;
  });
}

// ================== OPEN CHAT ==================
window.openPrivateChat = function (userId, userName) {

  if (!auth.currentUser) return alert("سجل دخول");

  currentChatId =
    auth.currentUser.uid < userId
      ? auth.currentUser.uid + "_" + userId
      : userId + "_" + auth.currentUser.uid;

  document.getElementById("chatBox").style.display = "block";

  listenMessages(currentChatId);
};

// ================== SEND MESSAGE ==================
window.sendMessage = async function () {

  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;
  if (!currentChatId) return alert("اختر مستخدم");

  try {
    await addDoc(
      collection(db, "chats", currentChatId, "messages"),
      {
        text,
        user: auth.currentUser.email,
        name: auth.currentUser.email.split("@")[0],
        time: serverTimestamp()
      }
    );

    input.value = "";
  } catch (e) {
    alert(e.message);
  }
};

// ================== LISTEN MESSAGES ==================
function listenMessages(chatId) {

  if (unsubscribeMessages) unsubscribeMessages();

  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time")
  );

  unsubscribeMessages = onSnapshot(q, (snap) => {

    const box = document.getElementById("messages");
    box.innerHTML = "";

    snap.forEach(d => {
      const m = d.data();
      const me = m.user === auth.currentUser.email;

      box.innerHTML += `
        <div style="text-align:${me ? "right" : "left"};margin:5px">
          <div style="display:inline-block;padding:8px;background:${me ? "#4CAF50" : "#eee"};color:${me ? "#fff" : "#000"};border-radius:10px">
            ${m.text}
          </div>
        </div>
      `;
    });

    box.scrollTop = box.scrollHeight;
  });
}

// ================== HELPERS ==================
function emailEl(){ return document.getElementById("email"); }
function passEl(){ return document.getElementById("password"); }


</script>
</body>
</html>
