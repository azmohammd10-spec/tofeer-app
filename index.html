<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef3f8;
padding-bottom:90px;
}

/* HEADER */
.header{
height:65px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
border-bottom:1px solid #e6edf5;
position:sticky;
top:0;
z-index:100;
}

/* SEARCH */
.search-box{
padding:12px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.05);
font-size:14px;
}

/* STORIES BAR */
.stories-bar{
display:flex;
gap:12px;
padding:12px;
overflow-x:auto;
background:#fff;
border-bottom:1px solid #eee;
}

.story{
text-align:center;
font-size:11px;
color:#555;
}

.story-avatar{
width:58px;
height:58px;
border-radius:50%;
background:linear-gradient(135deg,#8ee7ff,#8dffb8);
margin-bottom:5px;
}

/* CHAT LIST */
.list{
padding:12px;
}

.chat{
background:#fff;
border-radius:18px;
padding:14px;
margin-bottom:12px;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(135deg,#dff4ff,#e8fff1);
}

.info{
flex:1;
}

.name{
font-weight:700;
font-size:15px;
}

.last-msg{
font-size:13px;
color:#777;
margin-top:4px;
}

.time{
font-size:12px;
color:#999;
}

/* CAMERA BUTTON (MODERN) */
.camera-btn{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:18px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:linear-gradient(135deg,#ff4ecd,#7c5cff,#00e5ff);
color:#fff;
font-size:30px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,.25);
cursor:pointer;
}

.camera-btn:active{
transform:translateX(-50%) scale(0.92);
}

/* NAV SAFE SPACE */
.nav-space{
height:72px;
}

</style>
</head>

<body>

<div class="header">توفير</div>

<div class="search-box">
<input type="text" placeholder="🔍 بحث عن محادثة">
</div>

<!-- STORIES -->
<div class="stories-bar">

  <div class="story">
    <div class="story-avatar"></div>
    <small>أنت</small>
  </div>

  <div class="story">
    <div class="story-avatar"></div>
    <small>أحمد</small>
  </div>

  <div class="story">
    <div class="story-avatar"></div>
    <small>خالد</small>
  </div>

</div>

<!-- CHATS -->
<div class="list">

<div class="chat">
<div class="avatar"></div>
<div class="info">
<div class="name">أحمد</div>
<div class="last-msg">آخر رسالة هنا...</div>
</div>
<div class="time">أمس</div>
</div>

<div class="chat">
<div class="avatar"></div>
<div class="info">
<div class="name">خالد</div>
<div class="last-msg">مرحباً 👋</div>
</div>
<div class="time">12:15</div>
</div>

</div>

<!-- CAMERA BUTTON -->
<button class="camera-btn">＋</button>

<div class="nav-space"></div>

</body>
</html>
