<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#f6fbff;}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:90%;
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #e5e5e5;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#4da3ff;
color:#fff;
font-weight:600;
}

/* APP */
#app{display:none; height:100vh; flex-direction:column;}

.header{
background:#fff;
padding:15px;
font-weight:700;
border-bottom:1px solid #eee;
}

/* USERS */
.user{
background:#fff;
margin:10px;
padding:12px;
border-radius:12px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* CHAT */
#chatBox{
display:none;
flex-direction:column;
height:calc(100vh - 120px);
}

.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
background:#e8f4ff;
padding:10px;
margin:5px 0;
border-radius:10px;
max-width:70%;
}

.input{
display:flex;
padding:10px;
background:#fff;
border-top:1px solid #eee;
}

.input input{
flex:1;
margin:0;
}

.input button{
width:80px;
margin-left:5px;
}
</style>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="profile"></div>
    <h2>توفير</h2>
  </div>

  <!-- Search -->
  <div class="search-box">
    <input type="text" placeholder="بحث">
  </div>

  <!-- Chats -->
  <div class="chat-list">

    <div class="chat-item">
      <div class="avatar"></div>

      <div class="chat-info">
        <h4>أحمد</h4>
        <p>آخر رسالة...</p>
      </div>

      <span>10:30</span>
    </div>

    <div class="chat-item">
      <div class="avatar"></div>

      <div class="chat-info">
        <h4>خالد</h4>
        <p>مرحباً</p>
      </div>

      <span>أمس</span>
    </div>

  </div>

  <!-- Floating Button -->
  <button class="new-chat">+</button>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div>💬</div>
    <div>📞</div>
    <div>👤</div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 Firebase */
const firebaseConfig = {
apiKey: "PUT_YOUR_KEY",
authDomain: "tofeer-e9c5a.firebaseapp.com",
projectId: "tofeer-e9c5a",
appId: "1:927174968674:web:5bafb6e43161c50cda983b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = "";
let currentChat = "";

/* LOGIN */
window.login = function(){
user = document.getElementById("name").value;
if(!user) return;

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}

/* OPEN CHAT */
window.openChat = function(chatId){
currentChat = chatId;
document.getElementById("chatBox").style.display="flex";

loadMessages();
}

/* SEND */
window.sendMsg = async function(){

let msg = document.getElementById("msg").value;
if(!msg) return;

await addDoc(collection(db,"chats",currentChat,"messages"),{
text:msg,
user:user,
time:Date.now()
});

document.getElementById("msg").value="";
}

/* REAL TIME */
function loadMessages(){

const q = query(collection(db,"chats",currentChat,"messages"),orderBy("time"));

onSnapshot(q,(snap)=>{
let box = document.getElementById("messages");
box.innerHTML="";

snap.forEach(d=>{
let m = d.data();
box.innerHTML += `<div class="msg"><b>${m.user}:</b> ${m.text}</div>`;
});
});
}

</script>

</body>
</html>
