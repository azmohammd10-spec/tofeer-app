<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef3f8;
padding-bottom:90px;
}

/* HEADER */
.header{
height:65px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
border-bottom:1px solid #e6edf5;
position:sticky;
top:0;
z-index:100;
}

/* TOP TABS */
.top-tabs{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 18px;
background:#fff;
border-bottom:1px solid #eee;
position:sticky;
top:65px;
z-index:99;
}

/* TAB */
.tab{
display:flex;
flex-direction:column;
align-items:center;
font-size:18px;
color:#777;
gap:3px;
}

.tab span{
font-size:11px;
}

.tab.active{
color:#111;
font-weight:700;
}

/* CAMERA BUTTON */
.camera-btn{
width:52px;
height:52px;
border-radius:50%;
border:none;
background:linear-gradient(135deg,#ff4ecd,#7c5cff,#00e5ff);
color:#fff;
font-size:26px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 20px rgba(0,0,0,.2);
cursor:pointer;
}

.camera-btn:active{
transform:scale(0.92);
}

/* SEARCH */
.search-box{
padding:12px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.05);
font-size:14px;
}

/* CHAT LIST */
.list{
padding:12px;
}

.chat{
background:#fff;
border-radius:18px;
padding:14px;
margin-bottom:12px;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(135deg,#dff4ff,#e8fff1);
}

.info{
flex:1;
}

.name{
font-weight:700;
font-size:15px;
}

.last-msg{
font-size:13px;
color:#777;
margin-top:4px;
}

.time{
font-size:12px;
color:#999;
}

</style>
</head>

<body>

<div class="header">توفير</div>

<div class="top-tabs">

  <div class="tab active">
    💬
    <span>دردشه</span>
  </div>

  <button class="camera-btn">＋</button>

  <div class="tab">
    👁
    <span>تحديثات</span>
  </div>

</div>

<div class="search-box">
<input type="text" placeholder="🔍 بحث عن محادثة">
</div>

<div class="list">

<div class="chat">
<div class="avatar"></div>
<div class="info">
<div class="name">أحمد</div>
<div class="last-msg">آخر رسالة هنا...</div>
</div>
<div class="time">أمس</div>
</div>

<div class="chat">
<div class="avatar"></div>
<div class="info">
<div class="name">خالد</div>
<div class="last-msg">مرحباً 👋</div>
</div>
<div class="time">12:15</div>
</div>

</div>

</body>
</html>
