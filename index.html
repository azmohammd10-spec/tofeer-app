<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تطبيق توفير</title>
</head>
<body>

    <div id="login-section">
        <select id="countryCode"><option value="+967">+967</option></select>
        <input type="tel" id="phoneNumber" placeholder="7XXXXXXXX">
        <button id="sendBtn">إرسال كود</button>
    </div>

    <div id="verification-section" style="display:none;">
        <input type="text" id="verificationCode" placeholder="أدخل الكود">
        <button id="verifyBtn">تأكيد الدخول</button>
    </div>

    <div id="recaptcha-container"></div>

    <div id="chat-section" style="display:none;">
        <div id="chatList"></div>
        <input type="text" id="msgInput" placeholder="اكتب رسالة...">
        <button id="sendMsgBtn">إرسال</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSy039_c_pQmI33APYKfw_Z_af4iEPlcV-ts",
            authDomain: "tofeer-e9c5a.firebaseapp.com",
            projectId: "tofeer-e9c5a",
            storageBucket: "tofeer-e9c5a.firebasestorage.app",
            messagingSenderId: "927174968674",
            appId: "1:927174968674:web:5bafb6e43161c5cda983b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

        let confirmationResult;

        // ربط زر الإرسال
        document.getElementById('sendBtn').onclick = async () => {
            const phone = document.getElementById('countryCode').value + document.getElementById('phoneNumber').value;
            try {
                confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                document.getElementById('verification-section').style.display = 'block';
                alert("تم إرسال الكود!");
            } catch (e) { alert(e.message); }
        };

        // ربط زر التأكيد
        document.getElementById('verifyBtn').onclick = async () => {
            try {
                await confirmationResult.confirm(document.getElementById('verificationCode').value);
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('verification-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
            } catch (e) { alert("الكود غير صحيح"); }
        };
    </script>
</body>
</html>
