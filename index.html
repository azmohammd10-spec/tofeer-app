<style>
.call-btn{
width:42px;
height:42px;
border-radius:50%;
background:#8dffb8;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.chat{
display:flex;
align-items:center;
gap:12px;
padding:14px;
margin:10px 12px;
background:#fff;
border-radius:18px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(135deg,#dff4ff,#e8fff1);
}

.info{
flex:1;
}

.name{
font-weight:700;
font-size:15px;
}

.last-msg{
font-size:13px;
color:#777;
margin-top:4px;
}

.time{
font-size:12px;
color:#999;
}
</style>
</head>

<body>

<div class="header">
توفير
</div>

<div class="search-box">
<input type="text" placeholder="🔍 بحث عن محادثة">
</div>

<div class="list">

<!-- أحمد -->
<div class="chat">
  <div class="avatar"></div>

  <div class="info">
    <div class="name">أحمد</div>
    <div class="last-msg">آخر رسالة هنا...</div>
  </div>

  <div class="call-btn">📞</div>
</div>

<!-- خالد -->
<div class="chat">
  <div class="avatar"></div>

  <div class="info">
    <div class="name">خالد</div>
    <div class="last-msg">مرحباً 👋</div>
  </div>

  <div class="time">أمس</div>
</div>

<!-- محمد -->
<div class="chat">
  <div class="avatar"></div>

  <div class="info">
    <div class="name">محمد</div>
    <div class="last-msg">كيف حالك؟</div>
  </div>

  <div class="time">12:15</div>
</div>

</div>

</body>
</html>
