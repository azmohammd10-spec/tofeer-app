<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#f7fbff;
padding-bottom:90px;
}

/* HEADER */
.header{
height:65px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
border-bottom:1px solid #eef2f7;
position:sticky;
top:0;
z-index:100;
}

/* SEARCH */
.search-box{
padding:12px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.05);
font-size:14px;
}

/* LIST */
.list{
padding:12px;
}

/* CHAT */
.chat{
background:#fff;
border-radius:18px;
padding:14px;
margin-bottom:12px;
display:flex;
align-items:center;
gap:12px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(135deg,#dff4ff,#e8fff1);
}

.info{
flex:1;
}

.name{
font-weight:700;
font-size:15px;
}

.last-msg{
font-size:13px;
color:#777;
margin-top:4px;
}

.time{
font-size:12px;
color:#999;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:72px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #eef2f7;
z-index:999;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
font-size:20px;
}

.nav-item span{
font-size:11px;
color:#666;
}

/* CAMERA BUTTON */
.camera-tab{
position:absolute;
left:50%;
transform:translateX(-50%);
width:78px;
height:44px;
border:none;
background:transparent;
cursor:pointer;
}

.camera-tab::before{
content:"";
position:absolute;
left:-6px;
top:0;
width:78px;
height:44px;
background:#8ee7ff;
border-radius:12px;
}

.camera-tab::after{
content:"";
position:absolute;
right:-6px;
top:0;
width:78px;
height:44px;
background:#8dffb8;
border-radius:12px;
}

.camera-inner{
position:absolute;
inset:0;
background:#fff;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:700;
color:#111;
z-index:2;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}
</style>
</head>

<body>

<div class="header">توفير</div>

<div class="search-box">
<input type="text" placeholder="🔍 بحث عن محادثة">
</div>

<div class="list">

<div class="chat">
<div class="avatar"></div>
<div class="info">
<div class="name">أحمد</div>
<div class="last-msg">آخر رسالة هنا...</div>
</div>
<div class="time">أمس</div>
</div>

<div class="chat">
<div class="avatar"></div>
<div class="info">
<div class="name">خالد</div>
<div class="last-msg">مرحباً 👋</div>
</div>
<div class="time">12:15</div>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="nav">

<div class="nav-item">
💬
<span>الدردشات</span>
</div>

<button class="camera-tab">
<div class="camera-inner">+</div>
</button>

<div class="nav-item">
👁
<span>التحديثات</span>
</div>

</div>

</body>
</html>
