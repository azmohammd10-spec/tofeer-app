<script>
/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyD39_c_pQml33APYKfw_Z_aF4iEPlcV-ts",
  authDomain: "tofeer-e9c5a.firebaseapp.com",
  projectId: "tofeer-e9c5a",
  storageBucket: "tofeer-e9c5a.firebasestorage.app",
  messagingSenderId: "927174968674",
  appId: "1:927174968674:web:5bafb6e43161c50cda983b",
  measurementId: "G-LZ2MWRW4ND"
};

/* Initialize Firebase */
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* Recaptcha */
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
'recaptcha-container'
);

/* إرسال كود */
function sendCode(){

const code = document.getElementById("countryCode").value;
const phone = document.getElementById("phoneNumber").value;

auth.signInWithPhoneNumber(code + phone, window.recaptchaVerifier)
.then(result=>{
window.confirmationResult = result;
document.getElementById("verification").style.display="block";
})
.catch(e=>alert(e.message));

}

/* التحقق */
function verify(){

window.confirmationResult.confirm(
document.getElementById("code").value
).then(()=>{

document.getElementById("login-section").style.display="none";
document.getElementById("chat-section").style.display="flex";

loadMessages();

});

}

/* إرسال رسالة */
function sendMsg(){

db.collection("messages").add({
text: msgInput.value,
time: Date.now()
});

msgInput.value="";

}

/* تحميل الرسائل */
function loadMessages(){

db.collection("messages")
.orderBy("time")
.onSnapshot(snap=>{

chatList.innerHTML="";

snap.forEach(doc=>{
chatList.innerHTML += `
<div class="chat">${doc.data().text}</div>
`;
});

});

}
</script>
