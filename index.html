<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق دردشة</title>

<style>
#sendBtn {
    background: var(--main-color);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    cursor: pointer;
    transition: 0.2s ease;
}

#sendBtn:hover {
    transform: scale(1.05);
}

#sendBtn:active {
    transform: scale(0.95);
}

/* ================= ROOT VARIABLES ================= */
:root {
    --main-color: #00bfff;
    --text-color: #333;
    --bg-color: #ffffff;
    --border-color: #eee;
}

/* ================= DOTS ================= */
.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#ccc;
}

.dot.active{
    background:var(--main-color);
}  
  /* لون النص الأساسي */
    --text-color: #333;

    /* إضافات احترافية مفيدة */
    --bg-color: #ffffff;
    --border-color: #eee;
}
  #stories {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 5000;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{background:#fff}
#stories {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 5000;
}

.story-actions {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 25px;
    color: white;
    font-size: 26px;
}

.story-back {
    position: absolute;
    top: 15px;
    left: 15px;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 20px;
    cursor: pointer;
}
/* app */
#app{position:relative;height:100vh;overflow:hidden}
.page{position:absolute;width:100%;height:100%;top:0;left:0}

/* nav */
.nav{
position:fixed;bottom:0;width:100%;height:65px;
background:#fff;border-top:1px solid #eee;
display:flex;justify-content:space-around;align-items:center;
z-index:9999
}

/* chat page */
#chatPage{padding:70px 12px 90px}
.chat{
display:flex;justify-content:space-between;
padding:15px;border-bottom:1px solid #eee;cursor:pointer
}
.left{display:flex;gap:10px;align-items:center}
.avatar{width:45px;height:45px;border-radius:50%;background:#ddd}
.name{font-weight:bold}
.msg{font-size:12px;color:#777}

/* chat detail */
#chatDetail{
display:none;position:fixed;inset:0;background:#fff;
flex-direction:column;z-index:99999
}

.header{
display:flex;gap:10px;align-items:center;
padding:10px;border-bottom:1px solid #eee
}

#messages{
flex:1;overflow:auto;padding:10px
}

.msg{
margin:8px 0;padding:10px;border-radius:10px;
max-width:70%;background:#dcf8c6;margin-left:auto
}

.input-box{
display:flex;gap:5px;padding:10px;
border-top:1px solid #eee
}

.input-box input{
flex:1;border:none;background:#f5f5f5;
border-radius:20px;padding:10px
}

button{cursor:pointer}

/* emoji */
.emoji-box{
display:none;position:absolute;bottom:70px;
background:#fff;border-top:1px solid #eee;
padding:10px
}
.hidden{display:none}
</style>
</head>

<body>

<div id="app">
<div id="topNav" style="
position:fixed;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:8px;
z-index:99999;
">

<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>

</div>
<!-- CHAT PAGE -->
<div id="chatPage" class="page">

<div style="display:flex;justify-content:space-between;align-items:center;padding:15px">
<h3>الدردشات</h3>
<button onclick="alert('إضافة صديق')" style="padding:8px 12px;border:none;background:#0084ff;color:#fff;border-radius:10px">➕</button>
</div>


  
<div class="chat" onclick="openChat('أحمد')">
<div class="left">
<div class="avatar"></div>
<div><div class="name">أحمد</div><div class="msg">مرحباً 👋</div></div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="left">
<div class="avatar"></div>
<div><div class="name">خالد</div><div class="msg">كيف حالك؟</div></div>
</div>
</div>

</div>

<div id="stories" class="page">
    <button class="story-back" onclick="closeStories()">←</button>

    <div style="color:white; text-align:center; margin-top:50%;">
        هنا ستظهر القصص
    </div>

    <div class="story-actions">
        <div>❤</div>
        <div>👁</div>
    </div>
</div>


<!-- NAV -->
<div class="nav">
<div onclick="showChats()">💬<br>دردشة</div>
<div onclick="showStories()">👁<br>قصص</div>
<div onclick="showProfile()">👤<br>حسابي</div>
</div>

<script>

let active = null;
let chats = JSON.parse(localStorage.getItem("chats")) || {};

/* ================= CHAT SYSTEM ================= */

function openChat(name){
    active = name;
    document.getElementById("chatDetail").style.display = "flex";
    document.getElementById("chatName").innerText = name;

    if(!chats[name]) chats[name] = [];
    render();
}

function closeChat(){
    document.getElementById("chatDetail").style.display = "none";
    active = null;
}

function sendMsg(){
    let input = document.getElementById("msgInput");
    let text = input.value.trim();

    if(!text || !active) return;

    chats[active].push({
        text,
        time: new Date().toLocaleTimeString()
    });

    input.value = "";
    save();
    render();
}

function render(){
    let box = document.getElementById("messages");
    box.innerHTML = "";

    chats[active].forEach(m=>{
        let d = document.createElement("div");
        d.className = "msg";
        d.innerHTML = m.text + "<br><small>" + m.time + "</small>";
        box.appendChild(d);
    });

    box.scrollTop = box.scrollHeight;
}

function save(){
    localStorage.setItem("chats", JSON.stringify(chats));
}

/* ================= EMOJI ================= */

function toggleEmoji(){
    document.getElementById("emojiBox").classList.toggle("hidden");
}

function addEmoji(e){
document.getElementById("msgInput").value += e;
}

/* ================= STORIES ================= */

function showStories(){
showPage(1);
}

function closeStories(){
showPage(0);
}

/* ================= NAV SYSTEM ================= */

const pages = ["chatPage","stories","profilePage"];
let current = 0;

function showPage(i){

if(i < 0) i = 0;
if(i >= pages.length) i = pages.length - 1;

pages.forEach((id,index)=>{
    const page = document.getElementById(id);

    if(page){
        page.style.display =
        (index === i) ? "block" : "none";
    }
});

current = i;

updateDots(i);

}

function updateDots(i){
document.querySelectorAll(".dot").forEach((dot,index)=>{
dot.classList.toggle("active", index === i);
});
}

function showChats(){
showPage(0);
}

function showProfile(){
showPage(2);
}

/* ================= SWIPE ================= */

let startX = 0;
let isSwiping = false;

document.addEventListener("touchstart", e=>{
startX = e.touches[0].clientX;
isSwiping = true;
});

document.addEventListener("touchend", e=>{

if(!isSwiping) return;

let diff = startX - e.changedTouches[0].clientX;

if(Math.abs(diff) > 50){

    if(diff > 0){
        showPage(current + 1);
    }else{
        showPage(current - 1);
    }
}

isSwiping = false;

});

showPage(0);

</script>

</body>
</html>
