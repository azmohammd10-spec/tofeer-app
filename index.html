<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
}

body{
background:#f5f7fb;
height:100vh;
}

.app{
height:100vh;
display:flex;
flex-direction:column;
background:#fff;
}

.header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #eee;
font-size:20px;
font-weight:700;
}

.chat-list{
flex:1;
overflow-y:auto;
padding:10px;
}

.chat{
display:flex;
gap:10px;
padding:12px;
border-bottom:1px solid #eee;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:#ddd;
}

.chat-content{
flex:1;
}

.name{
font-weight:600;
margin-bottom:4px;
}

.message{
color:#666;
font-size:14px;
}

.message-box{
display:flex;
gap:8px;
padding:10px;
border-top:1px solid #eee;
}

.message-box input{
flex:1;
height:45px;
border:none;
background:#f1f1f1;
border-radius:10px;
padding:0 10px;
}

.message-box button{
width:80px;
border:none;
border-radius:10px;
background:#111827;
color:white;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
توفير
</div>

<div class="chat-list" id="chatList">

<div class="chat">
<div class="avatar"></div>
<div class="chat-content">
<div class="name">أحمد</div>
<div class="message">مرحباً بك في تطبيق توفير</div>
</div>
</div>

</div>

<div class="message-box">
<input id="msgInput" placeholder="اكتب رسالة">
<button onclick="sendMsg()">إرسال</button>
</div>

</div>

<script>
function sendMsg(){

const input = document.getElementById("msgInput");
const text = input.value.trim();

if(!text) return;

const chatList = document.getElementById("chatList");

chatList.innerHTML += `
<div class="chat">
<div class="avatar"></div>
<div class="chat-content">
<div class="name">أنت</div>
<div class="message">${text}</div>
</div>
</div>
`;

input.value = "";
chatList.scrollTop = chatList.scrollHeight;
}
</script>

</body>
</html>
