 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eafcff;
color:#000;
}

/* ===== CHAT LIST ===== */
#chatPage{
padding:10px;
padding-bottom:85px;
}

.chat{
display:flex;
align-items:center;
gap:12px;
background:#fff;
padding:14px;
margin-bottom:10px;
border-radius:16px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
cursor:pointer;
}

.avatar{
width:52px;
height:52px;
border-radius:50%;
background:#6fe7ff;
flex-shrink:0;
}

.name{
font-weight:700;
font-size:15px;
}

.msg{
font-size:13px;
color:#666;
margin-top:3px;
}

/* ===== CHAT SCREEN ===== */
#chatDetail{
display:none;
position:fixed;
inset:0;
background:#eafcff;
flex-direction:column;
z-index:999;
}

.header{
height:60px;
background:#fff;
display:flex;
align-items:center;
gap:10px;
padding:0 15px;
border-bottom:1px solid #d9f7ff;
}

.back{
width:38px;
height:38px;
border:none;
border-radius:10px;
background:#6fe7ff;
font-size:18px;
cursor:pointer;
}

#chatName{
font-weight:700;
}

#messages{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.my-msg{
align-self:flex-end;
background:#6fe7ff;
padding:10px 14px;
border-radius:18px 18px 4px 18px;
max-width:75%;
}

.other-msg{
align-self:flex-start;
background:#fff;
padding:10px 14px;
border-radius:18px 18px 18px 4px;
max-width:75%;
}

/* ===== INPUT ===== */
.input-box{
display:flex;
gap:10px;
padding:10px;
background:#fff;
border-top:1px solid #d9f7ff;
}

.input-box input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#eafcff;
outline:none;
}

.input-box button{
padding:12px 18px;
border:none;
background:#6fe7ff;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* ===== STORIES ===== */
#stories{
display:none;
position:fixed;
inset:0;
background:linear-gradient(180deg,#6fe7ff,#bff6ff);
z-index:998;
}

.story-right{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);

display:flex;
flex-direction:column;
gap:28px;
}

.story-bottom{
position:absolute;
left:15px;
bottom:80px;
display:flex;
align-items:center;
gap:10px;
}

.story-avatar{
font-size:40px;
}

.story-name{
font-weight:700;
}

/* ===== NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #d9f7ff;
}

.nav div{
font-size:24px;
cursor:pointer;
}

/* ===== + BUTTON (TIKTOK STYLE) ===== */
.plus{
width:52px;
height:42px;
background:#6fe7ff;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
position:relative;
top:-12px;
box-shadow:0 6px 15px rgba(0,0,0,.15);
cursor:pointer;
}

.plus:active{
transform:scale(.92);
}

</style>
</head>

<body>

<!-- CHAT LIST -->
<div id="chatPage">

<div class="chat" onclick="openChat('أحمد')">
<div class="avatar"></div>
<div>
<div class="name">أحمد</div>
<div class="msg">مرحباً 👋</div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>
<div class="name">خالد</div>
<div class="msg">كيف حالك؟</div>
</div>
</div>

</div>

<!-- CHAT -->
<div id="chatDetail">

<div class="header">
<button class="back" onclick="closeChat()">←</button>
<div id="chatName">محادثة</div>
</div>

<div id="messages">
<div class="other-msg">أهلاً 👋</div>
<div class="my-msg">مرحبا</div>
</div>

<div class="input-box">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="send()">إرسال</button>
</div>

</div>

<!-- STORIES -->
<div id="stories">

<div class="story-right">
<div class="story-action">❤️</div>
<div class="story-action">👁</div>
</div>

<div class="story-user">
<div class="story-avatar">🤵🏽</div>
<div>الحساب</div>
</div>

</div>

<!-- NAV -->
<div class="nav">

<div onclick="showChats()">💬</div>

<div class="plus">+</div>

<div onclick="showStories()">👁</div>

</div>

<script>

function openChat(name){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="flex";
document.getElementById("chatName").innerText=name;
}

function closeChat(){
document.getElementById("chatDetail").style.display="none";
document.getElementById("chatPage").style.display="block";
}

function showChats(){
document.getElementById("chatPage").style.display="block";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="none";
}

function showStories(){
document.getElementById("chatPage").style.display="none";
document.getElementById("chatDetail").style.display="none";
document.getElementById("stories").style.display="block";
}

function send(){

let input=document.getElementById("msgInput");

if(input.value.trim()!==""){

let msg=document.createElement("div");
msg.className="my-msg";
msg.innerText=input.value;

document.getElementById("messages").appendChild(msg);

input.value="";

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight;

}

}

</script>

</body>
</html>
