<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير - دردشة</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
}

body{
background:#f5f7fb;
height:100vh;
}

/* LOGIN */
#login-section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
padding:20px;
}

input{
width:100%;
max-width:320px;
height:45px;
border:none;
border-radius:12px;
padding:0 12px;
background:#eee;
outline:none;
}

button{
width:100%;
max-width:320px;
height:45px;
border:none;
border-radius:12px;
background:#111827;
color:#fff;
cursor:pointer;
}

/* CHAT APP */
#chat-section{
display:none;
height:100vh;
flex-direction:column;
background:#fff;
}

.header{
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
border-bottom:1px solid #eee;
}

.logo{
font-weight:700;
font-size:20px;
}

.profile{
width:40px;
height:40px;
border-radius:50%;
background:#ddd;
}

/* CHAT LIST */
.chat-list{
flex:1;
overflow-y:auto;
padding:10px;
}

.chat{
display:flex;
gap:10px;
padding:12px;
border-bottom:1px solid #f1f1f1;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:#e5e7eb;
}

.chat-content{
flex:1;
}

.name{
font-weight:600;
font-size:14px;
}

.message{
font-size:13px;
color:#666;
margin-top:4px;
}

/* INPUT */
.message-box{
display:flex;
gap:8px;
padding:10px;
border-top:1px solid #eee;
}

.message-box input{
flex:1;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-section">
<h2>تسجيل الدخول</h2>

<input type="tel" id="phoneNumber" placeholder="رقم الهاتف">
<button id="sendBtn">إرسال كود</button>

<div id="verification-section" style="display:none;width:100%;max-width:320px;">
<input type="text" id="verificationCode" placeholder="كود التحقق">
<button id="verifyBtn">تأكيد</button>
</div>

<div id="recaptcha-container"></div>
</div>

<!-- CHAT -->
<div id="chat-section">

<div class="header">
<div class="logo">توفير</div>
<div class="profile"></div>
</div>

<div class="chat-list" id="chatList">

<div class="chat">
<div class="avatar"></div>
<div class="chat-content">
<div class="name">أحمد</div>
<div class="message">مرحبا 👋</div>
</div>
</div>

</div>

<div class="message-box">
<input type="text" id="msgInput" placeholder="اكتب رسالة...">
<button onclick="sendMsg()">إرسال</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
/* Firebase Config */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID",
appId: "YOUR_APP"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let confirmationResult;

/* LOGIN */
document.getElementById("sendBtn").onclick = function(){
const phone = document.getElementById("phoneNumber").value;

const appVerifier = new firebase.auth.RecaptchaVerifier("recaptcha-container");

auth.signInWithPhoneNumber(phone, appVerifier)
.then((result)=>{
confirmationResult = result;
document.getElementById("verification-section").style.display="block";
});
};

document.getElementById("verifyBtn").onclick = function(){
const code = document.getElementById("verificationCode").value;

confirmationResult.confirm(code)
.then(()=>{
document.getElementById("login-section").style.display="none";
document.getElementById("chat-section").style.display="flex";
loadMessages();
});
};

/* SEND MESSAGE */
function sendMsg(){
let msg = document.getElementById("msgInput").value;

db.collection("messages").add({
text: msg,
time: Date.now(),
user: auth.currentUser.phoneNumber
});

document.getElementById("msgInput").value="";
}

/* LOAD MESSAGES */
function loadMessages(){
db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{
let chatList = document.getElementById("chatList");
chatList.innerHTML="";

snapshot.forEach(doc=>{
let m = doc.data();

chatList.innerHTML += `
<div class="chat">
<div class="avatar"></div>
<div class="chat-content">
<div class="name">${m.user}</div>
<div class="message">${m.text}</div>
</div>
</div>`;
});
});
}
</script>

</body>
</html>
