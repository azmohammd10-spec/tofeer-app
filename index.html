<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💬 الدردشة</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <style>
    /* ===================== الأنماط ===================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    :root {
      --primary: #0084ff;
      --primary-dark: #0066cc;
      --secondary: #00c6ff;
      --bg-app: #f5f7fa;
      --bg-messages: #e5ddd5;
      --bg-header: #f8f9fa;
      --bubble-sent: linear-gradient(135deg, #dcf8c6, #b9e8a0);
      --bubble-received: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #555;
      --text-light: #888;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 25px;
      --radius-bubble: 18px;
      --nav-height: 65px;
      --header-height: 60px;
      --transition: 0.3s ease;
      --emoji-picker-bg: #fff;
    }
    [data-theme="dark"] {
      --bg-app: #121212;
      --bg-messages: #1e1e1e;
      --bg-header: #2a2a2a;
      --bubble-sent: linear-gradient(135deg, #2d4a1e, #1f3a12);
      --bubble-received: #3a3a3a;
      --text-primary: #eee;
      --text-secondary: #bbb;
      --text-light: #888;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --emoji-picker-bg: #2a2a2a;
    }
    body {
      background: var(--bg-app);
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.5;
      height: 100dvh;
      overflow: hidden;
    }
    #app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    /* ===== رأس التطبيق ===== */
    .app-header {
      flex-shrink: 0;
      background: var(--bg-header);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      box-shadow: var(--shadow);
      z-index: 10;
    }
    .app-header h2 {
      font-size: 20px;
    }
    .app-header .actions button {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      margin-right: 8px;
      color: var(--text-secondary);
      transition: 0.2s;
    }
    .app-header .actions button:hover {
      transform: scale(1.1);
      color: var(--primary);
    }
    /* ===== قائمة الدردشات ===== */
    #chatList {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
      background: var(--bg-app);
    }
    .chat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      cursor: pointer;
      transition: background var(--transition);
      border-radius: 8px;
    }
    .chat-item:hover {
      background: rgba(0,132,255,0.05);
    }
    .chat-item .left {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
    }
    .chat-item .info .name {
      font-weight: 700;
      font-size: 16px;
    }
    .chat-item .info .last-msg {
      font-size: 13px;
      color: var(--text-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .chat-item .time {
      font-size: 11px;
      color: var(--text-light);
    }
    .add-friend-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .add-friend-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(0,132,255,0.3);
    }
    /* ===== نافذة المحادثة ===== */
    #chatModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-app);
      z-index: 9998;
      flex-direction: column;
      animation: slideUp 0.25s ease;
    }
    #chatModal.open {
      display: flex;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
