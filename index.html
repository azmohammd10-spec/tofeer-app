<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق دردشة</title>

<style>
#sendBtn{
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    background: linear-gradient(135deg, #00c6ff, #ff4ecd);
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    transition:0.3s;
}

#sendBtn.active{
    background: linear-gradient(135deg, #00ff9d, #00c6ff);
    transform: scale(1.1);
}

#sendBtn svg{
    transition:0.3s;
}

/* أنيميشن نبض */
@keyframes pulse {
    0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0,188,255,0.6);
    }
    70% {
        transform: scale(1.1);
        box-shadow: 0 0 0 12px rgba(0,188,255,0);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0,188,255,0);
    }
}


/* ================= DOTS ================= */
.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#ccc;
}

:root{
    --main-color:#00bfff;
    --text-color:#333;
    --bg-color:#fff;
    --border-color:#eee;
}
  #stories {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 5000;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{background:#fff}
#stories {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 5000;
}

.story-actions {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 25px;
    color: white;
    font-size: 26px;
}

.story-back {
    position: absolute;
    top: 15px;
    left: 15px;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 20px;
    cursor: pointer;
}
/* app */
#app{position:relative;height:100vh;overflow:hidden}
.page{position:absolute;width:100%;height:100%;top:0;left:0}

/* nav */
.nav{
position:fixed;bottom:0;width:100%;height:65px;
background:#fff;border-top:1px solid #eee;
display:flex;justify-content:space-around;align-items:center;
z-index:9999
}
.nav-btn{
    flex:1;
    text-align:center;
    position:relative;
    padding-top:8px;
}

.active-nav::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:30px;
    height:4px;
    border-radius:10px;
    background:#00bfff;
}
/* chat page */
#chatPage{padding:70px 12px 90px}
.chat{
display:flex;justify-content:space-between;
padding:15px;border-bottom:1px solid #eee;cursor:pointer
}
.left{display:flex;gap:10px;align-items:center}
.avatar{width:45px;height:45px;border-radius:50%;background:#ddd}
.name{font-weight:bold}
.msg{font-size:12px;color:#777}

/* chat detail */
#chatDetail{
    display:none;
    position:fixed;
    inset:0;
    background:#fff;
    flex-direction:column;
    z-index:99999;
}

.header{
    display:flex;
    gap:10px;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #eee;
}

#messages{
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg{
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    max-width:70%;
    background:#dcf8c6;
    margin-left:auto;
}

.input-box{
    display:flex;
    gap:5px;
    padding:10px;
    border-top:1px solid #eee;
}

.input-box input{
    flex:1;
    border:none;
    background:#f5f5f5;
    border-radius:20px;
    padding:10px;
}

.input-box input{
flex:1;border:none;background:#f5f5f5;
border-radius:20px;padding:10px
}

button{cursor:pointer}

/* emoji */
.emoji-box{
display:none;position:absolute;bottom:70px;
background:#fff;border-top:1px solid #eee;
padding:10px
}
.hidden{display:none}
</style>
</head>

<body>

<div id="chatPage" class="page">

    <div style="display:flex;justify-content:space-between;align-items:center;padding:15px">
        <h3>الدردشات</h3>
        <button onclick="alert('إضافة صديق')" style="padding:8px 12px;border:none;background:#0084ff;color:#fff;border-radius:10px">➕</button>
    </div>

    <div class="chat" onclick="openChat('أحمد')">
        <div class="left">
            <div class="avatar"></div>
            <div>
                <div class="name">أحمد</div>
                <div class="msg">مرحباً 👋</div>
            </div>
        </div>
    </div>

    <div class="chat" onclick="openChat('خالد')">
        <div class="left">
            <div class="avatar"></div>
            <div>
                <div class="name">خالد</div>
                <div class="msg">كيف حالك؟</div>
            </div>
        </div>
    </div>

    <!-- ✅ مهم: داخل chatPage -->
    <div id="chatDetail">

    <div class="header">
        <button onclick="closeChat()">←</button>
        <div id="chatName">محادثة</div>
    </div>

    <div id="messages"></div>

    <div class="input-box">
        <input id="msgInput" placeholder="اكتب رسالة...">

        <button id="sendBtn" onclick="handleSend()">
            <svg id="micIcon" viewBox="0 0 24 24" width="22" height="22" fill="none">
                <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z"
                      stroke="white" stroke-width="2"/>
                <path d="M19 11a7 7 0 0 1-14 0"
                      stroke="white" stroke-width="2"/>
                <path d="M12 18v3"
                      stroke="white" stroke-width="2"/>
            </svg>
        </button>
    </div>

</div> 

<!-- القصص -->
<div id="stories" class="page">
    <button class="story-back" onclick="closeStories()">←</button>

    <div style="color:white; text-align:center; margin-top:50%;">
        هنا ستظهر القصص
    </div>

    <div class="story-actions">
        <div>❤</div>
        <div>👁</div>
    </div>
</div>

<!-- الحساب -->
<div id="profilePage" class="page" style="display:none">
    <h2 style="padding:80px 20px">حسابي</h2>
</div>
<!-- NAV -->
<div class="nav">

<div id="navChat" class="nav-btn active-nav" onclick="showChats()">
💬<br>دردشة
</div>

<div id="navStories" class="nav-btn" onclick="showStories()">
👁<br>قصص
</div>

<div id="navProfile" class="nav-btn" onclick="showProfile()">
👤<br>حسابي
</div>

</div>
<script>

let active = null;
let chats = JSON.parse(localStorage.getItem("chats")) || {};

/* ================= CHAT ================= */

function openChat(name){
    active = name;

    document.getElementById("chatDetail").style.display = "flex";
    document.getElementById("chatName").innerText = name;

    if(!chats[name]) chats[name] = [];

    render();
}

function closeChat(){
    document.getElementById("chatDetail").style.display = "none";
    active = null;
}

/* إرسال رسالة */
function sendMsg(){
    let input = document.getElementById("msgInput");
    let text = input.value.trim();

    if(!text || !active) return;

    chats[active].push({
        text,
        time: new Date().toLocaleTimeString()
    });

    input.value = "";
    save();
    render();
}

/* عرض الرسائل */
function render(){
    let box = document.getElementById("messages");
    box.innerHTML = "";

    if(!active) return;

    chats[active].forEach(m=>{
        let d = document.createElement("div");
        d.className = "msg";
        d.innerHTML = m.text + "<br><small>" + m.time + "</small>";
        box.appendChild(d);
    });

    box.scrollTop = box.scrollHeight;
}

/* حفظ */
function save(){
    localStorage.setItem("chats", JSON.stringify(chats));
}

/* ================= زر ذكي ================= */

function handleSend(){
    sendMsg();
}

/* تغيير الزر */
document.addEventListener("input", function(e){
    if(e.target && e.target.id === "msgInput"){
        let btn = document.getElementById("sendBtn");
        let text = e.target.value.trim();

        if(text.length > 0){
            btn.innerText = "➤";
            btn.classList.add("active");
            btn.classList.remove("record");
        }else{
            btn.innerText = "🎤";
            btn.classList.remove("active");
            btn.classList.add("record");
        }
    }
});
const pages = ["chatPage", "stories", "profilePage"];
let current = 0;

function showPage(i){

    if(i < 0) i = 0;
    if(i >= pages.length) i = pages.length - 1;

    pages.forEach((id, index)=>{
        const el = document.getElementById(id);
        if(el){
            el.style.display = (index === i) ? "block" : "none";
        }
    });

    current = i;
document.querySelectorAll(".nav-btn").forEach(btn=>{
    btn.classList.remove("active-nav");
});

if(i === 0) document.getElementById("navChat").classList.add("active-nav");
if(i === 1) document.getElementById("navStories").classList.add("active-nav");
if(i === 2) document.getElementById("navProfile").classList.add("active-nav");
    updateDots(i);
}

function updateDots(i){
    document.querySelectorAll(".dot").forEach((d, index)=>{
        d.classList.toggle("active", index === i);
    });
}

function showChats(){ showPage(0); }
function showStories(){ showPage(1); }
function showProfile(){ showPage(2); }
let startX = 0;
let isSwiping = false;

document.addEventListener("touchstart", e => {

    if(document.getElementById("chatDetail").style.display === "flex") return;

    startX = e.touches[0].clientX;
    isSwiping = true;
});

document.addEventListener("touchend", e => {

    if(!isSwiping) return;

    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if(Math.abs(diff) > 60){

        if(diff > 0){
            showPage(current + 1);
        }else{
            showPage(current - 1);
        }
    }

    isSwiping = false;
});
function updateNav(){

    document.querySelectorAll(".nav-btn")
    .forEach(btn=>btn.classList.remove("active-nav"));

    if(current === 0)
      updateNav();  
        document.getElementById("navChat").classList.add("active-nav");

    if(current === 1)
        document.getElementById("navStories").classList.add("active-nav");

    if(current === 2)
        document.getElementById("navProfile").classList.add("active-nav");
}    
</script>

</body>
</html>
