<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق دردشة</title>

<style>
#sendBtn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    background: var(--main-color);
    color: #fff;
    font-size: 20px;
    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;

    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

/* عند وجود رسالة */
#sendBtn.active {
    background: #25d366;
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
}

/* نبض عند وضع التسجيل */
#sendBtn.record {
    animation: pulse 1.2s infinite;
}

/* أنيميشن نبض */
@keyframes pulse {
    0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0,188,255,0.6);
    }
    70% {
        transform: scale(1.1);
        box-shadow: 0 0 0 12px rgba(0,188,255,0);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0,188,255,0);
    }
}
/* ================= ROOT VARIABLES ================= */
:root {
    --main-color: #00bfff;
    --text-color: #333;
    --bg-color: #ffffff;
    --border-color: #eee;
}

/* ================= DOTS ================= */
.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#ccc;
}

.dot.active{
    background:var(--main-color);
}  
  /* لون النص الأساسي */
    --text-color: #333;

    /* إضافات احترافية مفيدة */
    --bg-color: #ffffff;
    --border-color: #eee;
}
  #stories {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 5000;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{background:#fff}
#stories {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 5000;
}

.story-actions {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 25px;
    color: white;
    font-size: 26px;
}

.story-back {
    position: absolute;
    top: 15px;
    left: 15px;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 20px;
    cursor: pointer;
}
/* app */
#app{position:relative;height:100vh;overflow:hidden}
.page{position:absolute;width:100%;height:100%;top:0;left:0}

/* nav */
.nav{
position:fixed;bottom:0;width:100%;height:65px;
background:#fff;border-top:1px solid #eee;
display:flex;justify-content:space-around;align-items:center;
z-index:9999
}

/* chat page */
#chatPage{padding:70px 12px 90px}
.chat{
display:flex;justify-content:space-between;
padding:15px;border-bottom:1px solid #eee;cursor:pointer
}
.left{display:flex;gap:10px;align-items:center}
.avatar{width:45px;height:45px;border-radius:50%;background:#ddd}
.name{font-weight:bold}
.msg{font-size:12px;color:#777}

/* chat detail */
#chatDetail{
    display:none;
    position:fixed;
    inset:0;
    background:#fff;
    flex-direction:column;
    z-index:99999;
}

.header{
    display:flex;
    gap:10px;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #eee;
}

#messages{
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg{
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    max-width:70%;
    background:#dcf8c6;
    margin-left:auto;
}

.input-box{
    display:flex;
    gap:5px;
    padding:10px;
    border-top:1px solid #eee;
}

.input-box input{
    flex:1;
    border:none;
    background:#f5f5f5;
    border-radius:20px;
    padding:10px;
}

.input-box input{
flex:1;border:none;background:#f5f5f5;
border-radius:20px;padding:10px
}

button{cursor:pointer}

/* emoji */
.emoji-box{
display:none;position:absolute;bottom:70px;
background:#fff;border-top:1px solid #eee;
padding:10px
}
.hidden{display:none}
</style>
</head>

<body>

<div id="app">
<div id="topNav" style="
position:fixed;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:8px;
z-index:99999;
">

<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>

</div>
<!-- CHAT PAGE -->
<div id="chatPage" class="page">

<div style="display:flex;justify-content:space-between;align-items:center;padding:15px">
<h3>الدردشات</h3>
<button onclick="alert('إضافة صديق')" style="padding:8px 12px;border:none;background:#0084ff;color:#fff;border-radius:10px">➕</button>
</div>


  
<div class="chat" onclick="openChat('أحمد')">
<div class="left">
<div class="avatar"></div>
<div><div class="name">أحمد</div><div class="msg">مرحباً 👋</div></div>
</div>
</div>

<div class="chat" onclick="openChat('خالد')">
<div class="left">
<div class="avatar"></div>
<div><div class="name">خالد</div><div class="msg">كيف حالك؟</div></div>
</div>
</div>

</div>

<div id="stories" class="page">
    <button class="story-back" onclick="closeStories()">←</button>

    <div style="color:white; text-align:center; margin-top:50%;">
        هنا ستظهر القصص
    </div>

    <div class="story-actions">
        <div>❤</div>
        <div>👁</div>
    </div>
</div>


<!-- NAV -->
<div class="nav">
<div onclick="showChats()">💬<br>دردشة</div>
<div onclick="showStories()">👁<br>قصص</div>
<div onclick="showProfile()">👤<br>حسابي</div>
</div>

<script>

let active = null;
let chats = JSON.parse(localStorage.getItem("chats")) || {};

/* ================= CHAT ================= */

function openChat(name){
    active = name;

    document.getElementById("chatDetail").style.display = "flex";
    document.getElementById("chatName").innerText = name;

    if(!chats[name]) chats[name] = [];

    render();
}

function closeChat(){
    document.getElementById("chatDetail").style.display = "none";
    active = null;
}

/* إرسال رسالة */
function sendMsg(){
    let input = document.getElementById("msgInput");
    let text = input.value.trim();

    if(!text || !active) return;

    chats[active].push({
        text,
        time: new Date().toLocaleTimeString()
    });

    input.value = "";
    save();
    render();
}

/* عرض الرسائل */
function render(){
    let box = document.getElementById("messages");
    box.innerHTML = "";

    if(!active) return;

    chats[active].forEach(m=>{
        let d = document.createElement("div");
        d.className = "msg";
        d.innerHTML = m.text + "<br><small>" + m.time + "</small>";
        box.appendChild(d);
    });

    box.scrollTop = box.scrollHeight;
}

/* حفظ */
function save(){
    localStorage.setItem("chats", JSON.stringify(chats));
}

/* ================= زر ذكي ================= */

function handleSend(){
    sendMsg();
}

/* تغيير الزر */
document.addEventListener("input", function(e){
    if(e.target && e.target.id === "msgInput"){
        let btn = document.getElementById("sendBtn");
        let text = e.target.value.trim();

        if(text.length > 0){
            btn.innerText = "➤";
            btn.classList.add("active");
            btn.classList.remove("record");
        }else{
            btn.innerText = "🎤";
            btn.classList.remove("active");
            btn.classList.add("record");
        }
    }
});
</script>

</body>
</html>
