<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:#f5f7fb;}

.app{display:block;}

.header{
height:60px;background:#fff;
display:flex;align-items:center;
padding:0 15px;font-weight:700;
border-bottom:1px solid #eee;
}

.content{padding:10px;height:calc(100vh - 120px);overflow-y:auto;}

.chat-item{
display:flex;gap:10px;
background:#fff;margin-bottom:10px;
padding:12px;border-radius:12px;
}

.avatar{width:45px;height:45px;border-radius:50%;background:#ddd;}

.bottom-nav{
position:fixed;bottom:0;left:0;right:0;
height:60px;background:#fff;
display:flex;justify-content:space-around;
align-items:center;border-top:1px solid #eee;
}

.nav-item{font-size:12px;color:#777;display:flex;flex-direction:column;align-items:center;}
.nav-item.active{color:#111;font-weight:600;}

#chat-screen{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#f5f7fb;
}

.chat-header{
height:60px;background:#fff;
display:flex;align-items:center;
justify-content:space-between;
padding:0 15px;border-bottom:1px solid #eee;
}

.back-btn{cursor:pointer;color:#007bff;}
</style>

</head>

<body>

<!-- APP -->
<div class="app">

<div class="header">توفير</div>

<div class="content">
<div class="content" id="chat-box">

</div>

<div style="display:flex;gap:5px;padding:10px;background:#fff;position:fixed;bottom:60px;left:0;right:0;">
    <input id="msg" placeholder="اكتب رسالة..." style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;">
    <button onclick="sendMsg()" style="padding:10px 15px;">إرسال</button>
</div>
</div>

<div class="chat-item" onclick="openChat('خالد')">
<div class="avatar"></div>
<div>خالد - شكراً لك</div>
</div>

</div>

<div class="bottom-nav">
<div class="nav-item active">💬 دردشات</div>
<div class="nav-item">📸 قصص</div>
</div>

</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">

<div class="chat-header">
<span id="chat-name">المحادثة</span>
<span class="back-btn" onclick="closeChat()">رجوع</span>
</div>

<div class="content">
<p style="text-align:center;color:#777;margin-top:20px;">
ابدأ المحادثة الآن 💬
</p>
</div>

</div>

<script>

function openChat(name){
document.querySelector(".app").style.display="none";
document.getElementById("chat-screen").style.display="block";
document.getElementById("chat-name").innerText=name;
}

function closeChat(){
document.querySelector(".app").style.display="block";
document.getElementById("chat-screen").style.display="none";
}

</script>

</body>
</html>
