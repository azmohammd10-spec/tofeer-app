<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توفير</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background:#f7fbff; padding-bottom:90px; }

        /* التصميمات كما هي... */
        .header { height:65px; background:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; border-bottom:1px solid #eef2f7; position:sticky; top:0; z-index:100; }
        .list { padding:12px; }
        .chat { background:#fff; border-radius:18px; padding:14px; margin-bottom:12px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 10px rgba(0,0,0,.05); }
        .avatar { width:55px; height:55px; border-radius:50%; background:linear-gradient(135deg,#dff4ff,#e8fff1); }
        .nav { position:fixed; bottom:0; left:0; right:0; height:72px; background:#fff; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #eef2f7; z-index:999; }
        .camera-tab { position:absolute; left:50%; transform:translateX(-50%); width:78px; height:44px; border:none; background:transparent; cursor:pointer; }
        
        /* القسم الخاص بالقصص */
        .stories-page { display:none; height:100vh; background:#000; position:fixed; top:0; left:0; width:100%; z-index:1000; }
        .story-video { height:100vh; position:relative; background:linear-gradient(180deg,#222,#000); }
    </style>
</head>
<body>

    <div id="chatPage">
        <div class="header">توفير</div>
        <div class="list">
            <div class="chat"><div class="avatar"></div><div class="info"><div class="name">أحمد</div></div></div>
            </div>
    </div>

    <div id="storiesPage" class="stories-page">
        <div class="story-video">
            <h1 style="color:white; text-align:center; padding-top:50%;">واجهة القصص</h1>
            <button onclick="showChats()" style="padding:10px; margin:20px;">العودة للدردشات</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item">💬 <span>الدردشات</span></div>
        <button class="camera-tab" onclick="showStories()">
            <div class="camera-inner">+</div>
        </button>
        <div class="nav-item">👁 <span>التحديثات</span></div>
    </div>

    <script>
        function showStories() {
            document.getElementById('chatPage').style.display = 'none';
            document.getElementById('storiesPage').style.display = 'block';
        }
        function showChats() {
            document.getElementById('chatPage').style.display = 'block';
            document.getElementById('storiesPage').style.display = 'none';
        }
    </script>
</body>
</html>
