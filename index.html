<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توفير</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef2f7;
}

/* LOGIN */
.screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.card{
width:85%;
background:#fff;
padding:20px;
border-radius:14px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111827;
color:#fff;
cursor:pointer;
}

/* APP */
#app{
display:none;
padding:20px;
}

.section{
background:#fff;
padding:12px;
margin-bottom:10px;
border-radius:12px;
}

.chat, .story, .profile{
background:#f8fafc;
padding:10px;
margin-top:8px;
border-radius:10px;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login-screen" class="screen">

<div class="card">

<h2>تسجيل الدخول</h2>

<input id="phone" placeholder="رقم الهاتف +967...">

<button onclick="sendCode()">إرسال كود</button>

<input id="code" placeholder="كود التحقق">

<button onclick="verifyCode()">تأكيد</button>

<div id="recaptcha"></div>

</div>

</div>

<!-- 📱 APP -->
<div id="app">

  <div class="section">
    <h3>📸 القصص</h3>
    <div class="story">قصة مستخدم 1 👁 1200</div>
    <div class="story">قصة مستخدم 2 👁 800</div>
  </div>

  <div class="section">
    <h3>💬 الدردشات</h3>
    <div class="chat">أحمد - مرحبا 👋</div>
    <div class="chat">خالد - شكراً لك</div>
  </div>

  <div class="section">
    <h3>👤 الحساب</h3>
    <div class="profile">اسم المستخدم: محمد</div>
  </div>

</div>

<!-- ⚙️ FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "tofeer-e9c5a.firebaseapp.com",
projectId: "tofeer-e9c5a",
appId: "1:927174968674:web:5bafb6e43161c50cda983b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* reCAPTCHA */
window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha", {
size: "invisible"
});

window.recaptchaVerifier.render();

/* 📩 إرسال كود */
window.sendCode = async function(){
try{
const phone = document.getElementById("phone").value;

window.confirmationResult = await signInWithPhoneNumber(
auth,
phone,
window.recaptchaVerifier
);

alert("تم إرسال الكود");

}catch(e){
alert(e.message);
}
};

/* ✅ تأكيد الكود */
window.verifyCode = async function(){
try{

const code = document.getElementById("code").value;

await window.confirmationResult.confirm(code);

alert("تم تسجيل الدخول");

document.getElementById("login-screen").style.display = "none";
document.getElementById("app").style.display = "block";

}catch(e){
alert(e.message);
}
};

</script>

</body>
</html>
