<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Star Social</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding:30px;
    }

    .box{
      background:#fff;
      padding:20px;
      border-radius:12px;
      width:300px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:90%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:95%;
      padding:10px;
      background:#4CAF50;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#45a049;
    }

    #home{
      display:none;
    }
  </style>
</head>
<body>
<div id="chatBox" style="display:none; width:300px; margin:auto;">
  <h3>💬 الدردشة</h3>

  <div id="messages" style="height:300px; overflow-y:auto; background:#eee; padding:10px; border-radius:10px;"></div>

  <input type="text" id="msg" placeholder="اكتب رسالة..." style="width:80%; padding:10px;">
  <button onclick="sendMessage()">إرسال</button>
</div>

<button onclick="openChat()">فتح الدردشة</button>
<div class="box" id="home">
  <h2>مرحبًا 👋</h2>
  <p id="userInfo"></p>
  <button onclick="logout()">تسجيل خروج</button>
</div>

<script type="module">
  import { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  window.openChat = function(){
  document.getElementById("chatBox").style.display = "block";
}
  window.sendMessage = async function(){
  let text = document.getElementById("msg").value;

  if(text.trim() === "") return;

  await addDoc(collection(db, "messages"), {
    text: text,
    user: auth.currentUser.email,
    time: serverTimestamp()
  });

  document.getElementById("msg").value = "";
}
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = {
    // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCEuOcQIvg-chEXfwHM8JAxFeYGpaOIoP4",
  authDomain: "star-social-bdfb2.firebaseapp.com",
  projectId: "star-social-bdfb2",
  storageBucket: "star-social-bdfb2.firebasestorage.app",
  messagingSenderId: "256449419301",
  appId: "1:256449419301:web:970b4905d6beb86c4087cc",
  measurementId: "G-JYT3F33K7Y"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // إنشاء حساب
  window.register = function(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then(user=>{
      alert("تم إنشاء الحساب بنجاح 🎉");
    })
    .catch(err=>{
      alert(err.message);
    });
  }

  // تسجيل دخول
  window.login = function(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(user=>{
      alert("تم تسجيل الدخول ✔");
    })
    .catch(err=>{
      alert(err.message);
    });
  }

  // تسجيل خروج
  window.logout = function(){
    signOut(auth);
  }

import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// قاعدة البيانات
const db = getFirestore(app);

// حالة المستخدم
onAuthStateChanged(auth, (user)=>{ 
  if(user){
    document.getElementById("login").style.display = "none";
    document.getElementById("home").style.display = "block";
    document.getElementById("userInfo").innerText = user.email;
  }else{
    document.getElementById("login").style.display = "block";
    document.getElementById("home").style.display = "none";
  }
});
  const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot)=>{
  let messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML = "";

  snapshot.forEach((doc)=>{
    let msg = doc.data();
    messagesDiv.innerHTML += `
      <p><b>${msg.user}:</b> ${msg.text}</p>
    `;
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});
</script>

</body>
</html>
